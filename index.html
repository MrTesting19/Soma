<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Sora',system-ui,sans-serif}
body{background:#F0EFEC;color:#1C1917;font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit;outline:none}
textarea{resize:none}
select{-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2378716C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;width:100%;background:var(--surf2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac,#F59E0B);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
#app{height:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden}
#hdr{padding:14px 18px 10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg);position:relative;z-index:10}
#content{flex:1;overflow-y:auto;padding:14px 18px 96px;scroll-behavior:smooth}
#bottomnav{position:absolute;bottom:0;left:0;right:0;height:68px;background:var(--surf);border-top:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-around;z-index:30;padding-bottom:max(env(safe-area-inset-bottom,0px),10px)}
#bottomnav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;border-radius:10px;transition:all .15s;color:var(--muted);background:none;border:none}
#bottomnav button.active{color:var(--ac)}
#bottomnav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
#bottomnav button span{font-size:10px;font-weight:500;letter-spacing:-.01em}
#morepanel{position:absolute;top:0;right:-260px;width:244px;height:100%;background:var(--surf);z-index:50;transition:right .26s cubic-bezier(.4,0,.2,1);border-left:0.5px solid var(--bdr);display:flex;flex-direction:column}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.2);z-index:40;display:none;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
#toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;z-index:200;display:none}
.sl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin:22px 0 10px}
.chip{display:inline-block;font-size:9px;font-weight:500;padding:2px 7px;border-radius:999px;white-space:nowrap;letter-spacing:.01em}
.mbar{margin-bottom:8px}.mbar-row{display:flex;justify-content:space-between;margin-bottom:3px}.mbar-row span:first-child{font-size:11px;color:var(--muted)}.mbar-row span:last-child{font-size:11px;font-weight:500}.mbar-track{height:4px;background:var(--surf2);border-radius:999px}.mbar-fill{height:100%;border-radius:999px;transition:width .3s ease}
.tog{width:40px;height:22px;border-radius:999px;background:var(--bdr);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer;border:none}.tog.on{background:var(--ac)}.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.1)}.tog.on::after{left:20px}
.fab{position:absolute;bottom:78px;right:18px;width:48px;height:48px;background:var(--ac);border-radius:14px;font-size:24px;color:#fff;display:flex;align-items:center;justify-content:center;z-index:25;box-shadow:0 4px 14px rgba(0,0,0,.15);border:none;cursor:pointer;transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.method-pill{display:inline-block;font-size:9px;padding:1px 6px;border-radius:5px;background:var(--surf2);color:var(--muted);margin-left:4px;font-weight:400}
.card{background:var(--surf);border-radius:14px;border:0.5px solid var(--bdr);overflow:hidden;margin-bottom:10px}
.card-p{padding:var(--pd)}
.dropdown{border:0.5px solid var(--bdr);border-radius:10px;padding:8px 12px;background:var(--surf);color:var(--text);font-size:12px;cursor:pointer}
.dropdown-compact{border:0.5px solid var(--bdr);border-radius:10px;padding:7px 10px;background:var(--surf);color:var(--text);font-size:11px;cursor:pointer;width:auto;max-width:160px;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2378716C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:24px}
.empty-state{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.task-done{text-decoration:line-through;color:var(--muted)!important}
.ml-search-inp{width:100%;border:0.5px solid var(--bdr);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);background:var(--surf2);box-sizing:border-box;margin-bottom:6px}
.ml-list{max-height:140px;overflow-y:auto;border:0.5px solid var(--bdr);border-radius:8px;background:var(--surf);margin-bottom:8px}
.ml-list-item{padding:8px 10px;font-size:12px;color:var(--text);cursor:pointer;border-bottom:0.5px solid var(--bdr)}
.ml-list-item:last-child{border-bottom:none}
.ml-list-item:active{background:var(--ac-bg)}
.ml-added{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surf2);border-radius:8px;margin-bottom:4px;font-size:12px}
.ml-field{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.ml-field input{flex:1;border:0.5px solid var(--bdr);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text);background:var(--surf);box-sizing:border-box}
.ml-field label{font-size:10px;color:var(--muted);min-width:50px;text-align:right}
.inline-form{background:var(--surf2);border:0.5px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px}
.inline-form input,.inline-form select{width:100%;border:0.5px solid var(--bdr);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);background:var(--surf);box-sizing:border-box;margin-bottom:6px}
.inline-form .form-row{display:flex;gap:6px;margin-bottom:6px}
.inline-form .form-row input{margin-bottom:0}
.inline-form .form-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
  <div id="overlay" onclick="closeMore()"></div>
  <div id="morepanel">
    <div style="padding:50px 18px 16px;border-bottom:0.5px solid var(--bdr)">
      <div style="font-size:22px;font-weight:700;color:var(--ac);letter-spacing:-.8px">soma</div>
      <div id="mp-sub" style="font-size:11px;color:var(--muted);margin-top:2px"></div>
    </div>
    <div id="mp-nav" style="flex:1;padding:10px;overflow-y:auto"></div>
    <div style="padding:12px 18px;border-top:0.5px solid var(--bdr);font-size:9px;color:var(--muted);letter-spacing:.02em">soma v5.4</div>
  </div>
  <div id="hdr">
    <span style="font-size:20px;font-weight:700;color:var(--ac);letter-spacing:-.8px">soma</span>
  </div>
  <div id="content"></div>
  <button class="fab" onclick="goLog()">+</button>
  <div id="bottomnav"></div>
  <div id="toast"><div style="background:#1C1917;border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.25)"><span id="toast-msg" style="color:#fff;font-size:12px;font-weight:400"></span><div style="display:flex;gap:10px;align-items:center"><button id="toast-undo" style="color:#F59E0B;font-size:12px;font-weight:600;display:none" onclick="doUndo()">Undo</button><button onclick="hideToast()" style="color:#6B7280;font-size:16px;line-height:1">&times;</button></div></div><div style="height:2px;background:#374151;border-radius:999px;margin-top:3px"><div id="toast-bar" style="height:100%;width:100%;background:#F59E0B;border-radius:999px;transition:width .08s linear"></div></div></div>
  <div id="modal-container"></div>
</div>
<script>
// ===== THEMES & ACCENTS =====
const FONTS={'sora':['Sora','sans-serif'],'dm-sans':['DM Sans','sans-serif'],'jakarta':['Plus Jakarta Sans','sans-serif'],'outfit':['Outfit','sans-serif'],'nunito':['Nunito Sans','sans-serif'],'inter':['Inter','sans-serif']};
const THEMES={light:{bg:'#F0EFEC',surf:'#FFFFFF',surf2:'#F7F7F6',text:'#1C1917',sub:'#44403C',muted:'#9CA3AF',bdr:'#E5E5E4'},dark:{bg:'#161615',surf:'#1E1D1C',surf2:'#272625',text:'#F5F5F4',sub:'#D6D3D1',muted:'#78716C',bdr:'#333230'},warm:{bg:'#FDF8F0',surf:'#FFFBF5',surf2:'#F5ECD9',text:'#2C1810',sub:'#5C3D2E',muted:'#9C7060',bdr:'#E8D5C0'},cool:{bg:'#F0F4F8',surf:'#FFFFFF',surf2:'#E8EFF6',text:'#1E2A3A',sub:'#354A60',muted:'#6B82A0',bdr:'#CDD8E5'}};
const ACCENTS={amber:{m:'#F59E0B',bg:'#FFFBEB',bdr:'#FDE68A',t:'#92400E'},teal:{m:'#14B8A6',bg:'#F0FDFA',bdr:'#99F6E4',t:'#0F766E'},blue:{m:'#3B82F6',bg:'#EFF6FF',bdr:'#BFDBFE',t:'#1D4ED8'},coral:{m:'#F97316',bg:'#FFF7ED',bdr:'#FED7AA',t:'#C2410C'},purple:{m:'#8B5CF6',bg:'#F5F3FF',bdr:'#DDD6FE',t:'#5B21B6'},green:{m:'#22C55E',bg:'#F0FDF4',bdr:'#BBF7D0',t:'#15803D'},rose:{m:'#F43F5E',bg:'#FFF1F2',bdr:'#FECDD3',t:'#BE123C'},slate:{m:'#64748B',bg:'#F8FAFC',bdr:'#CBD5E1',t:'#334155'},gold:{m:'#CA8A04',bg:'#FEFCE8',bdr:'#FEF08A',t:'#713F12'},mint:{m:'#34D399',bg:'#ECFDF5',bdr:'#A7F3D0',t:'#065F46'},crimson:{m:'#DC2626',bg:'#FEF2F2',bdr:'#FECACA',t:'#991B1B'},indigo:{m:'#6366F1',bg:'#EEF2FF',bdr:'#C7D2FE',t:'#3730A3'},ocean:{m:'#0EA5E9',bg:'#F0F9FF',bdr:'#BAE6FD',t:'#0369A1'},peach:{m:'#FB923C',bg:'#FFF7ED',bdr:'#FED7AA',t:'#9A3412'},olive:{m:'#84CC16',bg:'#F7FEE7',bdr:'#D9F99D',t:'#3F6212'},magenta:{m:'#D946EF',bg:'#FDF4FF',bdr:'#F5D0FE',t:'#86198F'},sky:{m:'#38BDF8',bg:'#F0F9FF',bdr:'#BAE6FD',t:'#0C4A6E'},copper:{m:'#C2724E',bg:'#FDF5F0',bdr:'#E8C4AD',t:'#7C3A1D'}};

// ===== SUPPLEMENT DATABASE (expanded with all protocol supps) =====
const SUPPLEMENT_DB=[
  {name:'Buscopan',dosePerUnit:10,unit:'mg',form:'tablet',kw:['buscopan','busc']},
  {name:'Famotidine',dosePerUnit:20,unit:'mg',form:'tablet',kw:['famotidine','famo']},
  {name:'Milk Thistle',dosePerUnit:1,unit:'cap',form:'capsule',kw:['milk thistle','milkthistle']},
  {name:'L-Taurine',dosePerUnit:500,unit:'mg',form:'capsule',kw:['taurine','l-taurine']},
  {name:'Slippery Elm',dosePerUnit:1,unit:'cap',form:'capsule',kw:['slippery elm','slippery']},
  {name:'Zinc Carnosine',dosePerUnit:1,unit:'cap',form:'capsule',kw:['zinc carnosine','zinc']},
  {name:'Magnesium Glycinate',dosePerUnit:400,unit:'mg',form:'capsule',kw:['magnesium glycinate','glycinate','mag glycinate']},
  {name:'Magnesium Citrate',dosePerUnit:3,unit:'g',form:'powder',kw:['magnesium citrate','citrate','mag citrate']},
  {name:'Vitamin B Complex',dosePerUnit:1,unit:'cap',form:'capsule',kw:['vitamin b','vit b','b complex','b-complex']}
];

// All supplement keywords for detection
let SUPP_KW=SUPPLEMENT_DB.flatMap(s=>s.kw);

// Prefix matching for supplements: "busc" -> Buscopan, etc.
function findSupplementByPrefix(text){
  const l=text.toLowerCase().trim();
  // Exact keyword match first
  for(const sup of SUPPLEMENT_DB){
    if(sup.kw.some(kw=>l.includes(kw)))return sup;
  }
  // Prefix match (3+ chars)
  const words=l.split(/\s+/);
  for(const w of words){
    if(w.length<3)continue;
    for(const sup of SUPPLEMENT_DB){
      if(sup.kw.some(kw=>kw.startsWith(w)||sup.name.toLowerCase().startsWith(w)))return sup;
    }
  }
  return null;
}

// ===== PERSISTENCE =====
function saveState(){try{const d={meals:S.todayMeals,symptoms:S.symptomLogs,stool:S.stoolLogs,notes:S.noteLogs,liquids:S.liquidLogs,activities:S.activityLogs,supplements:S.supplementLogs,tasks:S.tasks,morningDoneAt:S.morningDoneAt,morningData:S.morningData,theme:S.theme,accent:S.accent,font:S.font,fontSize:S.fontSize,density:S.density,sections:S.sections,targets:S.targets,days:S.days,supplementDoses:S.supplementDoses,foodDB:FDB,suppDB:SUPPLEMENT_DB,savedDate:new Date().toISOString().split('T')[0]};localStorage.setItem('soma_data',JSON.stringify(d));}catch(e){}}

function loadState(){try{const raw=localStorage.getItem('soma_data');if(!raw)return;const d=JSON.parse(raw);const today=new Date().toISOString().split('T')[0];if(d.savedDate===today){S.todayMeals=d.meals||[];S.symptomLogs=d.symptoms||[];S.stoolLogs=d.stool||[];S.noteLogs=d.notes||[];
if(d.liquids)S.liquidLogs=d.liquids;
else if(d.water)S.liquidLogs=(d.water||[]).map(w=>({ml:w.ml,name:'Water',time:w.time,type:'water'}));
else S.liquidLogs=[];
S.activityLogs=d.activities||[];S.supplementLogs=d.supplements||[];S.tasks=d.tasks||[];S.morningDoneAt=d.morningDoneAt||null;S.morningData=d.morningData||S.morningData;if(d.days)S.days=d.days;}else{if(d.meals&&d.meals.length>0||d.symptoms&&d.symptoms.length>0||d.activities&&d.activities.length>0){const hist=d.days||[];const dayLiquids=d.liquids||(d.water||[]).map(w=>({ml:w.ml,name:'Water',time:w.time,type:'water'}));const dayLiquidTotal=dayLiquids.reduce((s,l)=>s+(l.ml||0),0);hist.push({date:d.savedDate,meals:d.meals||[],symptoms:d.symptoms||[],stool:d.stool||[],notes:d.notes||[],liquids:dayLiquids,liquidTotal:dayLiquidTotal,morningData:d.morningData,activities:d.activities||[],supplements:d.supplements||[]});S.days=hist;}S.todayMeals=[];S.symptomLogs=[];S.stoolLogs=[];S.noteLogs=[];S.liquidLogs=[];S.activityLogs=[];S.supplementLogs=[];S.morningDoneAt=null;if(d.tasks)S.tasks=d.tasks;}
if(d.theme)S.theme=d.theme;if(d.accent)S.accent=d.accent;if(d.font)S.font=d.font;if(d.fontSize)S.fontSize=d.fontSize;if(d.density)S.density=d.density;if(d.sections)S.sections={...S.sections,...d.sections};if(d.targets)S.targets={...S.targets,...d.targets};if(d.supplementDoses)S.supplementDoses=d.supplementDoses;
if(d.foodDB){FDB.length=0;d.foodDB.forEach(f=>FDB.push(f));}
if(d.suppDB){SUPPLEMENT_DB.length=0;d.suppDB.forEach(s=>SUPPLEMENT_DB.push(s));SUPP_KW=SUPPLEMENT_DB.flatMap(s=>s.kw);}
(S.days||[]).forEach(day=>{
  if(!day.liquids&&day.water){day.liquids=(day.water||[]).map(w=>({ml:w.ml,name:'Water',time:w.time,type:'water'}));day.liquidTotal=day.liquids.reduce((s,l)=>s+(l.ml||0),0);}
  if(!day.liquids)day.liquids=[];
  if(!day.supplements)day.supplements=[];
  if(!day.activities)day.activities=[];
});
}catch(e){}}

// ===== EXPORT / IMPORT =====
function exportData(){
  try{
    const d={meals:S.todayMeals,symptoms:S.symptomLogs,stool:S.stoolLogs,notes:S.noteLogs,liquids:S.liquidLogs,activities:S.activityLogs,supplements:S.supplementLogs,tasks:S.tasks,morningDoneAt:S.morningDoneAt,morningData:S.morningData,theme:S.theme,accent:S.accent,font:S.font,fontSize:S.fontSize,density:S.density,sections:S.sections,targets:S.targets,days:S.days,supplementDoses:S.supplementDoses,foodDB:FDB,suppDB:SUPPLEMENT_DB,savedDate:new Date().toISOString().split('T')[0],exportedAt:new Date().toISOString()};
    const json=JSON.stringify(d,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='soma-backup-'+new Date().toISOString().split('T')[0]+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('Data exported successfully',null);
  }catch(e){showToast('Export failed: '+e.message,null);}
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.savedDate){showToast('Invalid backup file',null);return;}
        if(!confirm('This will replace ALL current data with the backup from '+d.savedDate+'. Continue?'))return;
        localStorage.setItem('soma_data',JSON.stringify(d));
        location.reload();
      }catch(er){showToast('Import failed: invalid JSON',null);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ===== APP STATE =====
const S={view:'home',theme:'light',accent:'amber',font:'sora',fontSize:'normal',density:'comfortable',
sections:{quickLog:true,todaySummary:true,meals:true,liquids:true,symptoms:true,supplements:true,stool:true,notes:true,dttInfo:true,activities:true},
targets:{calories:2500,protein:105,fat:55,carbs:380,water:2500},
logActive:false,logText:'',logResult:null,logLoading:false,logDismissTimer:null,expandedMeal:null,expandedInsight:null,expandedHistory:null,expandedLibMeal:null,
todayMeals:[],chartMetric:'weight',chartRange:'week',chartOverlay:null,
libTab:'all',libRange:'today',settingsTab:null,
morningOpen:false,morningStep:0,morningData:{tongue:false,tsev:5,nasal:false,brainfog:false,sleepTime:'',wokeTime:'',nightWakes:[],sleepQ:'Fair',weight:''},morningDoneAt:null,
docOpen:false,docDays:7,searchText:'',moreOpen:false,toastTimer:null,toastUndoFn:null,
symptomLogs:[],stoolLogs:[],noteLogs:[],liquidLogs:[],activityLogs:[],supplementLogs:[],
supplementDoses:{},
tasks:[],expandedTask:null,
dbTab:'foods',dbSearch:'',expandedDB:null,editingDB:null,
days:[],progressRange:'weekly',insightsViewed:false,
// Manual log mode
logMode:'quick',manualType:'ingredients',manualIngredients:[],manualSupplements:[],manualLiquids:[],manualActivities:[],manualSymptoms:[],
manualTime:null,manualDate:null,selectedIngredient:null,libraryEditMode:false,settingsCollapsed:{},
addingFood:false,addingSupp:false,addingTask:false};

function T(){return THEMES[S.theme]||THEMES.light;}
function A(){return ACCENTS[S.accent]||ACCENTS.amber;}
function z(){return S.fontSize==='large'?16:S.fontSize==='small'?12:14;}
function pd(){return S.density==='compact'?10:S.density==='spacious'?18:14;}
function ff(){const f=FONTS[S.font]||FONTS.sora;return f[0]+','+f[1];}

function applyTheme(){

function findFood(w){
  const raw=w.toLowerCase().trim();
  let s=raw;
  if(s.endsWith('oes')&&!s.endsWith('toes')){s=s.slice(0,-2);}
  else if(s.endsWith('toes')){s=s.slice(0,-2);}
  else if(s.endsWith('ies')){s=s.slice(0,-3)+'y';}
  else if(s.endsWith('s')&&!s.endsWith('ss')&&!s.endsWith('us')){s=s.slice(0,-1);}
  let cl=s;
  COOK_WORDS.forEach(cw=>{cl=cl.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});
  cl=cl.replace(/\s+/g,' ').trim();
  if(!cl)return null;
  return FDB.find(f=>f.n===cl||f.n===s||f.n===raw||cl.includes(f.n)||f.n.includes(cl)||(f.a&&f.a.some(a=>a===cl||a===s||a===raw||cl.includes(a)||a.includes(cl))));
}
function extractCook(text){const l=text.toLowerCase();for(const cw of COOK_WORDS){if(l.includes(cw))return cw.charAt(0).toUpperCase()+cw.slice(1);}return null;}
function tc(s){return s.replace(/\b\w/g,c=>c.toUpperCase());}

function cleanName(n){
  let c=n.toLowerCase();
  const protectedNames=['sweet potato','white rice','brown rice','sea bass','bone broth','egg white','white fish','coconut oil','olive oil','ginger tea','maris piper','coconut water'];
  const placeholders={};
  protectedNames.forEach((pn,i)=>{
    const ph='__PROT'+i+'__';
    if(c.includes(pn)){placeholders[ph]=pn;c=c.replace(new RegExp(pn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),ph);}
  });
  COOK_WORDS.forEach(cw=>{c=c.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});
  c=c.replace(/\bat\b/gi,'').trim();
  // Strip leftover date fragments
  c=c.replace(/\b(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\b/gi,'').trim();
  c=c.replace(/\bon\b/gi,'').trim();
  c=c.replace(/^\d+\s+/,'').replace(/\s+\d+$/,'').trim();
  Object.entries(placeholders).forEach(([ph,orig])=>{c=c.replace(new RegExp(ph,'g'),orig);});
  let result=tc(c.replace(/\s+/g,' ').trim());
  if(result.length<=3){
    const fd=findFood(result);
    if(fd)result=tc(fd.n);
  }
  return result;
}

function calcDTT(m){let b=(m.texture||'')==='Slurry'?1.5:(m.texture||'')==='Mashed'?2:(m.texture||'')==='Soft'?2.5:3;if((m.fat||0)>20)b+=1;else if((m.fat||0)>12)b+=0.5;if((m.cals||0)>600)b+=0.5;return b.toFixed(1);}
function macroLvl(mk,v){const T2={calories:[500,300],protein:[35,20],carbs:[60,30],fat:[8,4],sugar:[8,4],fibre:[5,2]};const[hi,md]=T2[mk]||[100,50];return v>=hi?{l:'High',c:'#DC2626'}:v>=md?{l:'Med',c:'#D97706'}:{l:'Low',c:'#16A34A'};}

// ===== STRIP TIME & DATE from text =====
function stripTime(text){
  return text
    .replace(/\bat\s+\d{1,2}(:\d{2})?\s*(am|pm)\b/gi,'')
    .replace(/\bat\s+\d{1,2}:\d{2}\b/gi,'')
    .replace(/^\d{1,2}\s*(am|pm)\s*/i,'')
    .replace(/^\d{1,2}:\d{2}\s*(am|pm)?\s*/i,'')
    .replace(/\s+/g,' ').trim();
}

function stripDateRef(text){
  return text
    .replace(/\b(?:on\s+)?(?:\d{1,2}\s+)?(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s*\d{0,2}\b/gi,'')
    .replace(/\b(?:on\s+)?\d{1,2}\s+(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\b/gi,'')
    .replace(/\byesterday\b/gi,'')
    .replace(/\bon\s+$/gi,'')
    .replace(/\s+/g,' ').trim();
}

function parseTargetDate(text){
  const l=text.toLowerCase();
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];
  if(/\byesterday\b/i.test(l)){
    const yd=new Date(today);yd.setDate(yd.getDate()-1);
    return yd.toISOString().split('T')[0];
  }
  // Match "March 30" or "30 March" or "on March 30" or "on 30 March"
  const dm=l.match(/(?:on\s+)?(\d{1,2})\s+(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)/i)||
            l.match(/(?:on\s+)?(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+(\d{1,2})/i);
  if(dm){
    let day,mStr;
    if(/^\d/.test(dm[1])){day=parseInt(dm[1]);mStr=dm[2];}
    else{mStr=dm[1];day=parseInt(dm[2]);}
    const monthNames={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const mKey=mStr.substring(0,3).toLowerCase();
    const month=monthNames[mKey];
    if(month!==undefined){
      const year=today.getFullYear();
      const target=new Date(year,month,day);
      const tStr=target.toISOString().split('T')[0];
      if(tStr<todayStr)return tStr;
      if(tStr===todayStr)return null;
    }
  }
  return null;
}

// ===== MEAL PARSER (local fallback) =====
function parseMealTime(text){
  const low=text.toLowerCase();
  let time=null;
  // Patterns with am/pm
  const timePatterns=[
    /^(\d{1,2})\s*(am|pm)\b/i,
    /^(\d{1,2}):(\d{2})\s*(am|pm)\b/i,
    /\bat\s+(\d{1,2})\s*(am|pm)\b/i,
    /\bat\s+(\d{1,2}):(\d{2})\s*(am|pm)\b/i
  ];
  for(const pat of timePatterns){
    const tm=low.match(pat);
    if(tm){
      if(pat===timePatterns[0]||pat===timePatterns[2]){
        let h2=+tm[1];const ap=tm[2]?tm[2].toLowerCase():null;
        if(ap==='pm'&&h2<12)h2+=12;if(ap==='am'&&h2===12)h2=0;
        time=(h2<10?'0':'')+h2+':00';
      }else{
        let h2=+tm[1];const min=tm[2]||'00';const ap=tm[3]?tm[3].toLowerCase():null;
        if(ap==='pm'&&h2<12)h2+=12;if(ap==='am'&&h2===12)h2=0;
        time=(h2<10?'0':'')+h2+':'+min;
      }
      break;
    }
  }
  // Bare HH:MM with "at" prefix — treat as 24hr
  if(!time){const tm2=low.match(/\bat\s+(\d{1,2}):(\d{2})/);if(tm2){
    const h2=+tm2[1];const m2=tm2[2];
    time=(h2<10?'0':'')+h2+':'+m2;
  }}
  // Bare HH:MM at start — treat as 24hr
  if(!time){const tm3=low.match(/^(\d{1,2}):(\d{2})\b/);if(tm3){
    const h2=+tm3[1];const m2=tm3[2];
    time=(h2<10?'0':'')+h2+':'+m2;
  }}
  if(!time)time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  return time;
}

function parseMeal(text){
const time=parseMealTime(text);
const cleaned=stripDateRef(stripTime(text)).toLowerCase();
let k=0,p=0,c=0,f=0,s=0,fi=0;
const ings=[],ingMethods=[],done=new Set(),ingFoodNames=[];

const addF=(fd,g,label,cm)=>{
  if(!fd||done.has(fd.n))return;
  const[fk,fp,fc,ff2,fs,ffi]=fd.v;
  k+=fk*g/100;p+=fp*g/100;c+=fc*g/100;f+=ff2*g/100;s+=fs*g/100;fi+=ffi*g/100;
  ings.push(label);ingMethods.push(cm||null);ingFoodNames.push(fd.n);done.add(fd.n);
};

const parts=cleaned.split(/\s+and\s+|,|\+/).map(p2=>p2.trim()).filter(Boolean);

parts.forEach(part=>{
  const partMethod=extractCook(part);
  let cl2=part;
  COOK_WORDS.forEach(cw=>{cl2=cl2.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});
  const sizeMatch=cl2.match(/\b(small|medium|large|extra large|xl)\b/i);
  cl2=cl2.replace(/\b(small|medium|large|extra large|xl)\b/gi,'').replace(/\s+/g,' ').trim();
  if(!cl2)return;

  // 1. Gram pattern — check "sweet potato" etc with protected matching
  const gMatch=cl2.match(/^(\d+(?:\.\d+)?)\s*g\s+(?:of\s+)?(.+)/i)||cl2.match(/(.+?)\s+(\d+(?:\.\d+)?)\s*g$/i);
  if(gMatch){
    const isReversed=cl2.match(/(.+?)\s+(\d+(?:\.\d+)?)\s*g$/i);
    const grams=isReversed?+gMatch[2]:+gMatch[1];
    const fname=isReversed?gMatch[1].trim():gMatch[2].trim();
    const fd=findFood(fname);
    if(fd){addF(fd,grams,cleanName(fname)+': '+grams+'g',partMethod);return;}
  }

  // 2. Cup pattern
  const cupMatch=cl2.match(/^(\d+(?:\.\d+)?)\s+cups?\s+(?:of\s+)?(.+)/i);
  if(cupMatch){
    const fd=findFood(cupMatch[2].trim());
    if(fd&&fd.cupG){addF(fd,+cupMatch[1]*fd.cupG,cleanName(cupMatch[2].trim())+': '+cupMatch[1]+' cup'+(+cupMatch[1]!==1?'s':''),partMethod);return;}
  }

  // 3. Egg pattern
  const eggMatch=cl2.match(/^(\d+)?\s*(?:(?:small|medium|large|extra large|xl)\s+)?(?:(?:fried|boiled|scrambled|poached)\s+)?eggs?$/i)||
                  cl2.match(/^(\d+)?\s*eggs?\s*$/i);
  if(eggMatch||/\beggs?\b/i.test(cl2)){
    const fd=findFood('egg');
    if(fd&&fd.gpu){
      const qm=part.match(/(\d+)\s+/);
      const qty=qm?+qm[1]:1;
      let sizeG=fd.gpu;
      if(sizeMatch){
        const sz2=sizeMatch[1].toLowerCase();
        if(sz2==='small')sizeG=42;else if(sz2==='medium')sizeG=48;else if(sz2==='large')sizeG=50;else if(sz2==='extra large'||sz2==='xl')sizeG=56;
      }
      const eggMethod=extractCook(part);
      addF(fd,qty*sizeG,'Egg'+(qty>1?'s':'')+' x'+qty,eggMethod);
      return;
    }
  }

  // 4. Tsp pattern
  const tspMatch=cl2.match(/^(\d+(?:\.\d+)?)\s+tsps?\s+(?:of\s+)?(.+)/i);
  if(tspMatch){const fd=findFood(tspMatch[2].trim());if(fd&&fd.gpu){addF(fd,+tspMatch[1]*fd.gpu,cleanName(tspMatch[2].trim())+': '+tspMatch[1]+' tsp',partMethod);return;}}

  // 5. Tbsp pattern
  const tbspMatch=cl2.match(/^(\d+(?:\.\d+)?)\s+tbsps?\s+(?:of\s+)?(.+)/i);
  if(tbspMatch){const fd=findFood(tbspMatch[2].trim());if(fd){addF(fd,+tbspMatch[1]*15,cleanName(tbspMatch[2].trim())+': '+tbspMatch[1]+' tbsp',partMethod);return;}}

  // 6. ML pattern
  const mlMatch=cl2.match(/^(\d+)\s*ml\s+(?:of\s+)?(.+)/i);
  if(mlMatch){const fd=findFood(mlMatch[2].trim());if(fd){addF(fd,+mlMatch[1],cleanName(mlMatch[2].trim())+': '+mlMatch[1]+'ml',partMethod);return;}}

  // 7. Date pattern
  const dateMatch=cl2.match(/^(\d+)\s+(?:medjool\s+)?dates?$/i);
  if(dateMatch){const fd=findFood('date');if(fd&&fd.gpu){addF(fd,+dateMatch[1]*fd.gpu,'Medjool Date'+(+dateMatch[1]>1?'s':'')+' x'+dateMatch[1],partMethod);return;}}

  // 8. Generic
  const numMatch=cl2.match(/^(\d+(?:\.\d+)?)\s+(.+)/);
  const fd=findFood(numMatch?numMatch[2]:cl2);
  if(fd){
    let g=fd.defG||100;
    if(numMatch&&fd.gpu)g=+numMatch[1]*fd.gpu;
    else if(numMatch)g=+numMatch[1];
    addF(fd,g,cleanName(numMatch?numMatch[2]:cl2)+': '+Math.round(g)+'g',partMethod);
  }
});

const tex=ings.some(i=>i.toLowerCase().includes('blend'))?'Slurry':ings.some(i=>i.toLowerCase().includes('mash'))?'Mashed':'Soft';
const fr=Math.round(f);
const mealName=(()=>{
  const names=ings.map((i2,idx)=>{
    const foodName=ingFoodNames[idx]||'';
    if(CONDIMENTS.has(foodName.toLowerCase()))return null;
    let raw=i2.split(':')[0].split('x')[0].replace(/[0-9]/g,'').trim();
    return cleanName(raw);
  }).filter(n2=>n2&&n2.length>1);
  if(!names.length)return'Logged Meal';
  if(names.length===1)return names[0];
  if(names.length===2)return names[0]+' & '+names[1];
  return names.slice(0,-1).join(', ')+' & '+names[names.length-1];
})();
const allMethods=ingMethods.filter(m2=>m2&&m2!=='Not specified');
const overallMethod=allMethods.length>0?allMethods[0]:'Not specified';
return{name:mealName,ingredients:ings.length>0?ings:['From description: '+text.slice(0,50)],ingredientMethods:ingMethods.length>0?ingMethods:undefined,cals:Math.round(k)||null,protein:Math.round(p)||null,carbs:Math.round(c)||null,fat:fr||null,sugar:Math.round(s)||null,fibre:+(fi.toFixed(1))||null,time,texture:tex,fatLevel:fr>12?'High':fr>5?'Medium':'Low',cookingMethod:overallMethod};}

// ===== DETECTION & PARSING =====
const SKW=['heartburn','cramp','pain','bloat','nausea','reflux','burn','ache','tired','fatigue','fog','coating','dizzy','constip','diarrh','vomit','wind','gas','itch','rash','indigestion','red skin'];
const MKW=['rice','chicken','fish','pollock','cod','egg','potato','ghee','oil','cup','gram','ate','meal','breakfast','lunch','dinner','cooked','boiled','blended','slurry','mash','salmon','tuna','turkey','sweet','carrot','banana','oats','porridge','pasta','avocado','honey','date','prawn','haddock','mackerel','broccoli','spinach','whey','protein','basa'];
const LKW=['water','hydrat','drink','glass','bottle','tea','herbal','peppermint','chamomile','fennel tea','liquorice tea','licorice tea','broth','bone broth','juice','squash','infusion','beverage','coconut water','coconut'];
const STOOL_KW=['stool','bristol','type 1','type 2','type 3','type 4','type 5','type 6','type 7','bowel movement','poo'];
const AKW=['sauna','steam','walk','walking','swim','exercise','gym','run','meditation','meditate','cold','stress','stressful','breathwork','yoga','stretch','hike','hiking','lymph','weed'];

// Supplement detection — uses prefix matching
function isSupplementEntry(text){
  const l=text.toLowerCase();
  if(findSupplementByPrefix(l))return true;
  if(/\b\d+\s*(?:mg|mcg|iu)\b/i.test(l))return true;
  return false;
}

function detectType(text){
  const l=text.toLowerCase();
  // LIQUID FIRST: if clearly a liquid, don't let it fall through to meal
  const isLiquidTerm=/\b(?:water|coconut water|tea|broth|juice|squash|peppermint|chamomile|fennel|ginger tea|herbal|liquorice)\b/i.test(l);
  const hasLiquidQty=/\b\d+\s*(?:ml|litre|liter|l\b|glass)/i.test(l);
  const hasMealQty=/\b\d+\s*g\b/i.test(l);
  if((isLiquidTerm||hasLiquidQty)&&!hasMealQty){
    // Make sure it's not a meal with liquid ingredients
    const mealWords=MKW.filter(x=>x!=='coconut'&&l.includes(x)).length;
    if(mealWords===0)return'liquid';
  }
  // Supplement check
  if(isSupplementEntry(l))return'supplement';
  const st=STOOL_KW.filter(x=>l.includes(x)).length;
  const sm=SKW.filter(x=>l.includes(x)).length;
  const m=MKW.filter(x=>l.includes(x)).length;
  const ac=AKW.filter(x=>l.includes(x)).length;
  if(st>0&&m===0)return'stool';
  if(ac>0&&m===0&&sm===0)return'activity';
  const foodMatch=findFood(stripDateRef(stripTime(text)));
  if(m>0||foodMatch)return'meal';
  if(sm>0)return'symptom';
  return'note';
}

function parseStool(text){const l=text.toLowerCase();const tm=l.match(/type\s*(\d)/);const type=tm?+tm[1]:4;let color='Brown';['dark brown','green','yellow-brown','yellow','light brown'].forEach(c=>{if(l.includes(c))color=tc(c);});return{type,color,assisted:l.includes('assist')||l.includes('suppository'),note:null,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})};}

function parseSymptom(text){const l=text.toLowerCase();let sym=null,level=null,duration=null,time=null,timeStart=null,timeEnd=null;
const symMap={cramping:/cramp/,burn:/burn/,reflux:/reflux|heartburn/,bloating:/bloat/,fatigue:/fatigue|tired/,brainfog:/brain\s*fog|fog/,dryskin:/dry\s*skin|skin/,tongue:/tongue|coating/,indigestion:/indigestion/,nasal:/nasal|congestion/,redskin:/red\s*skin|redness/};
for(const[k2,re] of Object.entries(symMap)){if(re.test(l)){sym=k2;break;}}
const lm=l.match(/(\d+(?:\.\d+)?)\s*(?:\/\s*10|out of 10)/);if(lm)level=+lm[1];
const dm2=l.match(/(?:for\s+)?(\d+)\s*(min|hour|hr)/i);if(dm2)duration=dm2[1]+' '+dm2[2]+(+dm2[1]>1?'s':'');
const rangeMatch=l.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s*[-–to]+\s*(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
if(rangeMatch){
  let sh=parseInt(rangeMatch[1]),sm2=rangeMatch[2]||'00',sap=rangeMatch[3]||rangeMatch[6];
  let eh=parseInt(rangeMatch[4]),em2=rangeMatch[5]||'00',eap=rangeMatch[6];
  if(sap){sap=sap.toLowerCase();if(sap==='pm'&&sh<12)sh+=12;if(sap==='am'&&sh===12)sh=0;}
  if(eap){eap=eap.toLowerCase();if(eap==='pm'&&eh<12)eh+=12;if(eap==='am'&&eh===12)eh=0;}
  timeStart=(sh<10?'0':'')+sh+':'+sm2;timeEnd=(eh<10?'0':'')+eh+':'+em2;time=timeStart+'–'+timeEnd;
  const diffMins=(eh*60+parseInt(em2))-(sh*60+parseInt(sm2));
  if(diffMins>0&&!duration){if(diffMins>=60)duration=Math.floor(diffMins/60)+' hr'+(Math.floor(diffMins/60)>1?'s':'');else duration=diffMins+' mins';}
}else{
  const tmm=l.match(/(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))/i);
  if(tmm){let raw=tmm[1];const ap=raw.match(/(am|pm)/i);let h2=parseInt(raw);const minM=raw.match(/:(\d{2})/);const min=minM?minM[1]:'00';
  if(ap&&ap[1].toLowerCase()==='pm'&&h2<12)h2+=12;if(ap&&ap[1].toLowerCase()==='am'&&h2===12)h2=0;time=(h2<10?'0':'')+h2+':'+min;}
  else{const tmm2=l.match(/at\s+(\d{1,2}:\d{2})/);if(tmm2)time=tmm2[1];else time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
}
return{symptom:sym,level,duration,time,timeStart,timeEnd,raw:text};}

function parseActivity(text){
  const l=text.toLowerCase();let activity=null;
  const actMap={'sauna':/\bsauna\b/,'steam room':/\bsteam\b/,'walk':/\bwalk(?:ing)?\b/,'hike':/\bhik(?:e|ing)\b/,'swim':/\bswim/,'exercise':/\bexercise|gym\b/,'run':/\brun(?:ning)?\b/,'meditation':/\bmeditat/,'cold water':/\bcold\b/,'breathwork':/\bbreathwork\b/,'yoga':/\byoga\b/,'stretch':/\bstretch/,'lymph workout':/\blymph\b/,'stressful event':/\bstress/,'weed':/\bweed\b/};

  let duration=null;const dm=l.match(/(?:for\s+)?(\d+)\s*(min|hour|hr)/i);if(dm)duration=dm[1]+' '+dm[2]+(+dm[1]>1?'s':'');
  let time=null;
  const tmm=l.match(/(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))/i);
  if(tmm){let raw=tmm[1];const ap=raw.match(/(am|pm)/i);let h2=parseInt(raw);const minM=raw.match(/:(\d{2})/);const min=minM?minM[1]:'00';if(ap&&ap[1].toLowerCase()==='pm'&&h2<12)h2+=12;if(ap&&ap[1].toLowerCase()==='am'&&h2===12)h2=0;time=(h2<10?'0':'')+h2+':'+min;}
  if(!time){const bare=l.match(/^(\d{1,2})\s*(am|pm)\b/i);if(bare){let h2=parseInt(bare[1]);const ap=bare[2].toLowerCase();if(ap==='pm'&&h2<12)h2+=12;if(ap==='am'&&h2===12)h2=0;time=(h2<10?'0':'')+h2+':00';}
  else{const bare24=l.match(/\bat\s+(\d{1,2}):(\d{2})\b/);if(bare24)time=(+bare24[1]<10?'0':'')+bare24[1]+':'+bare24[2];else time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}}

}

function parseSupplementLog(text){

  if(!matched)return{name:text.trim(),quantity:1,totalDose:'1 unit',time:getNow(),note:null};
  let quantity=1;
  const qm=l.match(/x\s*(\d+)/i)||l.match(/(\d+)\s*(?:caps?|tablets?|scoops?)/i);
  if(qm)quantity=parseInt(qm[1]);
  const customDose=S.supplementDoses[matched.name];

  let time=null;

  if(tmm){let raw=tmm[1];const ap=raw.match(/(am|pm)/i);let h2=parseInt(raw);const minM=raw.match(/:(\d{2})/);const min=minM?minM[1]:'00';if(ap&&ap[1].toLowerCase()==='pm'&&h2<12)h2+=12;if(ap&&ap[1].toLowerCase()==='am'&&h2===12)h2=0;time=(h2<10?'0':'')+h2+':'+min;}
  if(!time){const bare24=l.match(/\bat\s+(\d{1,2}):(\d{2})\b/);if(bare24)time=(+bare24[1]<10?'0':'')+bare24[1]+':'+bare24[2];}

function parseLiquid(text){
  const l=text.toLowerCase();
  let ml=250;
  const mlM=l.match(/(\d+)\s*ml/);if(mlM)ml=+mlM[1];
  const litreM=l.match(/(\d+(?:\.\d+)?)\s*(?:litre|liter|l\b)/);if(litreM)ml=Math.round(+litreM[1]*1000);
  const glassM=l.match(/(\d+)\s*glass/);if(glassM)ml=+glassM[1]*250;
  const cupM=l.match(/(\d+(?:\.\d+)?)\s+cups?\b/);
  let name='Water';
  const drinkMap=[
    [/ginger\s*tea/,'Ginger Tea'],[/peppermint/,'Peppermint Tea'],[/chamomile/,'Chamomile Tea'],
    [/fennel/,'Fennel Tea'],[/liquorice|licorice/,'Liquorice Tea'],[/bone\s*broth/,'Bone Broth'],
    [/broth|stock/,'Broth'],[/coconut\s*water/,'Coconut Water'],[/juice/,'Juice'],[/squash/,'Squash'],[/herbal/,'Herbal Tea'],
    [/tea/,'Tea'],[/water/,'Water']
  ];
  for(const[re,n] of drinkMap){if(re.test(l)){name=n;break;}}
  if(cupM){const fd=findFood(name.toLowerCase());if(fd&&fd.cupG)ml=Math.round(+cupM[1]*fd.cupG);else ml=Math.round(+cupM[1]*240);}
  let type='water';if(name!=='Water')type='tea';if(name==='Bone Broth'||name==='Broth')type='broth';if(name==='Juice'||name==='Squash'||name==='Coconut Water')type='other';
  // Parse time
  let time=null;
  const tmm=l.match(/(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))/i);
  if(tmm){let raw=tmm[1];const ap=raw.match(/(am|pm)/i);let h2=parseInt(raw);const minM=raw.match(/:(\d{2})/);const min=minM?minM[1]:'00';if(ap&&ap[1].toLowerCase()==='pm'&&h2<12)h2+=12;if(ap&&ap[1].toLowerCase()==='am'&&h2===12)h2=0;time=(h2<10?'0':'')+h2+':'+min;}
  if(!time){const bare24=l.match(/\bat\s+(\d{1,2}):(\d{2})\b/);if(bare24)time=(+bare24[1]<10?'0':'')+bare24[1]+':'+bare24[2];}
  if(!time)time=getNow();
  return{ml,name,time,type};
}

      const entry={name:sup.name,quantity:sup.quantity,totalDose:sup.dose+sup.unit,time,note:null};
      if(isPast)logToPastDate(dateStr,'supplement',entry);else S.supplementLogs.push(entry);

  }else if(S.manualType==='activities'&&S.manualActivities.length>0){

      const entry={activity:ac.activity,duration:ac.duration,time,note:null};
      if(isPast)logToPastDate(dateStr,'activity',entry);else S.activityLogs.push(entry);
    });
    S.logResult={type:'activity',activity:S.manualActivities[0].activity};if(!isPast)showToast('Activity logged',null);
  }else if(S.manualType==='symptoms'&&S.manualSymptoms.length>0){

  S.logActive=false;S.manualIngredients=[];S.manualSupplements=[];S.manualLiquids=[];S.manualActivities=[];S.manualSymptoms=[];S.manualTime=null;S.manualDate=null;S.selectedIngredient=null;
  saveState();render();
}

// ===== AI-POWERED LOGGING =====
const AI_SYSTEM_PROMPT=`You are a nutrition parser for a health tracking app. Parse the user's log entry and return ONLY valid JSON.
Detect type: meal, liquid, supplement, water, symptom, stool, activity, or note.
IMPORTANT PARSING RULES:
- Do NOT assume a cooking method unless the user explicitly states one.
- Parse ALL ingredients mentioned. "chicken breast, potatoes and carrots" = 3 separate ingredients.
- Handle compound quantities: "2 cups rice and 3 fried eggs" = both items.
- For eggs: 1 egg without shell = 50g. Small ~42g, Medium ~48g, Large ~50g, XL ~56g.
- Coconut water is a LIQUID, not a meal. Log as type "liquid" with liquidType "other".
- Water is a LIQUID with 0 calories, not a meal.
- Fat per-meal limit is 12g. Flag meals above this.
- When no cooking method is stated, use "Not specified".
- Bare times like "11:55" or "13:00" without am/pm are 24-hour format.
For meals, calculate accurate macros. Never include ghee, olive oil, coconut oil, or butter in the meal name.
Extract cooking method per ingredient. Extract time if mentioned (format HH:MM 24hr).
If the entry mentions a past date (e.g. "yesterday", "on 25 march", "march 30"), include "targetDate" field. Today is ${new Date().toISOString().split('T')[0]}.
Return this exact JSON structure:
{"type":"meal","targetDate":"2026-03-25","meal":{"name":"Chicken Breast & Rice","time":"11:00","cookingMethod":"Not specified","texture":"Soft","fatLevel":"Low","cals":450,"protein":42,"carbs":55,"fat":4,"sugar":0,"fibre":0.5,"ingredients":["Chicken Breast: 150g","White Rice: 200g"],"ingredientMethods":["Not specified","Not specified"]}}
For liquids: {"type":"liquid","name":"Coconut Water","ml":300,"time":"14:00","liquidType":"other"}
For water: {"type":"liquid","name":"Water","ml":500,"time":"09:00","liquidType":"water"}
For supplements: {"type":"supplement","name":"Buscopan","quantity":1,"time":"14:00"}
For symptom: {"type":"symptom","symptom":"cramping","level":4,"duration":"2 hrs","time":"14:00","timeStart":"14:00","timeEnd":"16:00","raw":"..."}
For stool: {"type":"stool","stoolType":4,"color":"Brown","assisted":false}
For activity: {"type":"activity","activity":"Walk","duration":"30 mins","intensity":"moderate","note":null,"time":"13:00"}
For note: {"type":"note","text":"..."}
Return ONLY JSON. No markdown. No explanation.`;

async function aiParse(text){
  try{const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:AI_SYSTEM_PROMPT,messages:[{role:"user",content:text}]})});
  if(!response.ok)throw new Error('API '+response.status);
  const data=await response.json();const raw=data.content.map(i=>i.text||'').join('').trim();return JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){console.error('AI parse failed:',e);return null;}}

function logToPastDate(targetDate,type,entry){
  let day=S.days.find(d=>d.date===targetDate);
  if(!day){day={date:targetDate,meals:[],symptoms:[],stool:[],notes:[],liquids:[],liquidTotal:0,activities:[],supplements:[]};S.days.push(day);S.days.sort((a,b)=>a.date.localeCompare(b.date));}
  if(!day.activities)day.activities=[];if(!day.liquids)day.liquids=[];if(!day.supplements)day.supplements=[];
  if(type==='meal')(day.meals=day.meals||[]).unshift(entry);
  else if(type==='symptom')(day.symptoms=day.symptoms||[]).push(entry);
  else if(type==='stool')(day.stool=day.stool||[]).push(entry);
  else if(type==='liquid'){(day.liquids=day.liquids||[]).push(entry);day.liquidTotal=(day.liquidTotal||0)+entry.ml;}
  else if(type==='activity')(day.activities).push(entry);
  else if(type==='supplement')(day.supplements).push(entry);
  else if(type==='note')(day.notes=day.notes||[]).push(entry);
  showToast('Logged to '+targetDate,null);
}

async function doLog(){
const text=(S.logText||'').trim();if(!text)return;
S.logLoading=true;S.logActive=false;S.logText='';render();
const localTargetDate=parseTargetDate(text);
// Override time/date from pickers if set
const pickerTime=S.manualTime||null;
const pickerDate=S.manualDate||null;
const todayStr=new Date().toISOString().split('T')[0];
const effectiveDate=pickerDate&&pickerDate!==todayStr?pickerDate:(localTargetDate||null);

const aiResult=await aiParse(text);
if(aiResult&&aiResult.type){
  const td=aiResult.targetDate||effectiveDate||null;
  // Override time from picker
  if(pickerTime){
    if(aiResult.meal)aiResult.meal.time=pickerTime;
    if(aiResult.time)aiResult.time=pickerTime;
  }
  processAIResult(aiResult,text,td);
}else{
  const parts=splitLogEntry(text);
  parts.forEach(part=>{processLocalPart(part.text,effectiveDate,pickerTime);});
}
S.logLoading=false;S.manualTime=null;S.manualDate=null;saveState();render();}

function processAIResult(res,rawText,targetDate){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];
  if(res.type==='meal'&&res.meal){

function findSuppFromAI(res){
  const name=res.name||'Unknown';const quantity=res.quantity||1;
  const dbMatch=SUPPLEMENT_DB.find(s=>s.name.toLowerCase()===name.toLowerCase()||s.kw.some(kw=>name.toLowerCase().includes(kw)));
  if(dbMatch){const customDose=S.supplementDoses[dbMatch.name];const dosePerUnit=customDose||dbMatch.dosePerUnit;return{name:dbMatch.name,quantity,totalDose:(quantity*dosePerUnit)+dbMatch.unit,time:res.time||getNow(),note:null};}
  return{name,quantity,totalDose:quantity+' unit'+(quantity>1?'s':''),time:res.time||getNow(),note:null};
}

function processLocalPart(text,targetDate,pickerTime){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];
  const type=detectType(text);
  if(type==='meal'){const meal=parseMeal(text);if(pickerTime)meal.time=pickerTime;if(isPast){logToPastDate(targetDate,'meal',meal);}else{S.todayMeals=[meal,...S.todayMeals];}S.logResult={type:'meal',meal};if(!isPast)showToast(meal.name+' logged',null);
  }else if(type==='liquid'){const liq=parseLiquid(text);if(pickerTime)liq.time=pickerTime;if(isPast){logToPastDate(targetDate,'liquid',liq);}else{S.liquidLogs.push(liq);}S.logResult={type:'liquid',ml:liq.ml,name:liq.name};if(!isPast)showToast(liq.name+' — '+liq.ml+'ml logged',null);
  }else if(type==='supplement'){const sup=parseSupplementLog(text);if(pickerTime)sup.time=pickerTime;if(isPast){logToPastDate(targetDate,'supplement',sup);}else{S.supplementLogs.push(sup);}S.logResult={type:'supplement',name:sup.name,totalDose:sup.totalDose};if(!isPast)showToast(sup.name+' logged',null);
  }else if(type==='stool'){const stool=parseStool(text);if(isPast){logToPastDate(targetDate,'stool',stool);}else{S.stoolLogs.push(stool);}S.logResult={type:'stool',stool};if(!isPast)showToast('Stool logged — Type '+stool.type,null);
  }else if(type==='symptom'){const parsed=parseSymptom(text);if(pickerTime)parsed.time=pickerTime;if(isPast){logToPastDate(targetDate,'symptom',parsed);}else{S.symptomLogs.push(parsed);}S.logResult={type:'symptom',text,time:parsed.time};if(!isPast)showToast('Symptom logged',null);
  }else if(type==='activity'){const act=parseActivity(text);if(pickerTime)act.time=pickerTime;if(isPast){logToPastDate(targetDate,'activity',act);}else{S.activityLogs.push(act);}S.logResult={type:'activity',activity:act.activity};if(!isPast)showToast(act.activity+' logged',null);
  }else{if(isPast){logToPastDate(targetDate,'note',text);}else{S.noteLogs.push(text);}S.logResult={type:'note',text};if(!isPast)showToast('Note saved',null);}
}

function splitLogEntry(text){const sentences=text.split(/(?<=[.!])\s+/).filter(s2=>s2.trim().length>0);if(sentences.length>1)return sentences.map(s2=>({text:s2.trim()}));const parts=text.split(/\.\s+/).filter(s2=>s2.trim().length>0);if(parts.length>1)return parts.map(s2=>({text:s2.trim()}));return[{text}];}

else if(S.morningStep===6){

  const inp=document.createElement('input');inp.type='number';inp.step='0.1';inp.value=d.weight||'';inp.placeholder='00.0 kg';
  Object.assign(inp.style,{width:'100%',fontSize:(sz+6)+'px',fontWeight:'600',textAlign:'center',border:'0.5px solid '+t.bdr,borderRadius:'12px',padding:'16px',boxSizing:'border-box',background:t.surf2,color:t.text});
  inp.oninput=e=>{S.morningData.weight=e.target.value;};
  content.appendChild(inp);
  setTimeout(()=>inp.focus(),50);
}

sheet.appendChild(content);
const lastStep=totalSteps-1;
const btns=div({display:'flex',gap:'8px',marginTop:'20px',alignItems:'center'});
btns.appendChild(btn(S.morningStep===6?{padding:'12px 16px',borderRadius:'12px',border:'0.5px solid '+t.bdr,background:t.surf2,color:t.muted,fontSize:sz+'px',cursor:'pointer',fontWeight:'500'}:{padding:'8px 12px',background:'none',border:'none',color:t.muted,fontSize:(sz-2)+'px',cursor:'pointer'},'Skip',()=>{if(S.morningStep<lastStep){S.morningStep++;renderModal();}else{S.morningOpen=false;S.morningDoneAt=Date.now();saveState();renderModal();render();showToast('Morning check-in saved ✓',null);}}));
if(S.morningStep>0)btns.appendChild(btn({flex:'1',padding:'12px',borderRadius:'12px',border:'0.5px solid '+t.bdr,background:t.surf,color:t.muted,fontSize:sz+'px',cursor:'pointer'},'Back',()=>{S.morningStep--;renderModal();}));
btns.appendChild(btn({flex:'2',padding:'12px',borderRadius:'12px',border:'none',background:a.m,color:'#fff',fontSize:sz+'px',fontWeight:'600',cursor:'pointer'},S.morningStep<lastStep?'Continue':'Done',()=>{if(S.morningStep<lastStep){S.morningStep++;renderModal();}else{S.morningOpen=false;S.morningDoneAt=Date.now();saveState();renderModal();render();showToast('Morning check-in saved ✓',null);}}));
sheet.appendChild(btns);bg.appendChild(sheet);return bg;}

function buildDocModal(){
const t=T(),a=A(),sz=z();
const totalLiq=S.liquidLogs.reduce((s2,l)=>s2+l.ml,0);const tCals=S.todayMeals.reduce((s2,m)=>s2+(m.cals||0),0);const tP=S.todayMeals.reduce((s2,m)=>s2+(m.protein||0),0);const tF=S.todayMeals.reduce((s2,m)=>s2+(m.fat||0),0);const tC=S.todayMeals.reduce((s2,m)=>s2+(m.carbs||0),0);const todayDate=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
const report=['SOMA HEALTH EXPORT — Sean, 24yo, Male, 5\'11"','Date: '+todayDate,'','BLOOD MARKERS (most recent):','  ALT: 71 (07 Feb) → 206 (15 Mar)','  Neutrophils: 0.9 → 0.7','  WBC: 2.7 → 3.0 | Platelets: 99 → 105','  Iron, B12, Ferritin, Folate: All normal','','MORNING CHECK-IN:',S.morningDoneAt?['  Tongue coating: '+(S.morningData.tongue?'Yes ('+S.morningData.tsev+'/10)':'No'),'  Nasal congestion: '+(S.morningData.nasal?'Yes':'No'),'  Brain fog: '+(S.morningData.brainfog?'Yes':'No'),'  Sleep (fell asleep): '+(S.morningData.sleepTime||'Not recorded'),'  Woke: '+(S.morningData.wokeTime||'Not recorded')+(S.morningData.nightWakes&&S.morningData.nightWakes.length>0?' | Night wakes: '+S.morningData.nightWakes.map(nw=>nw.time+' ('+nw.duration+'min)').join(', '):''),'  Sleep quality: '+S.morningData.sleepQ,'  Weight: '+(S.morningData.weight?S.morningData.weight+'kg':'Not recorded')].join('\n'):'  Not completed today','','TODAY\'S MACROS:','  Calories: '+tCals+' kcal (target: '+S.targets.calories+')','  Protein: '+tP+'g | Fat: '+tF+'g | Carbs: '+tC+'g','','MEALS LOGGED ('+S.todayMeals.length+'):',
...(S.todayMeals.length>0?S.todayMeals.map(m=>'  '+m.time+': '+m.name+' ('+m.cals+' kcal, P:'+m.protein+'g F:'+m.fat+'g C:'+m.carbs+'g)'+'\n    Ingredients: '+(m.ingredients||[]).join(', ')):['  None logged']),'',
'SUPPLEMENTS LOGGED ('+S.supplementLogs.length+'):',
...(S.supplementLogs.length>0?S.supplementLogs.map(sup=>'  '+(sup.time||'')+': '+sup.name+(sup.quantity>1?' x'+sup.quantity:'')+' — '+sup.totalDose):['  None logged']),'',
'SYMPTOMS LOGGED ('+S.symptomLogs.length+'):',
...(S.symptomLogs.length>0?S.symptomLogs.map(s2=>'  '+(s2.symptom?tc(s2.symptom):'Unknown')+' at '+(s2.time||'')+(s2.level?' — '+s2.level+'/10':'')+(s2.duration?' for '+s2.duration:'')):['  None logged']),'',
'ACTIVITIES LOGGED ('+S.activityLogs.length+'):',
...(S.activityLogs.length>0?S.activityLogs.map(ac=>'  '+(ac.time||'')+' · '+(ac.activity||'Activity')+(ac.duration?' · '+ac.duration:'')+(ac.note?' · '+ac.note:'')):['  None logged']),'',
'LIQUIDS INTAKE: '+totalLiq+'ml (target: '+S.targets.water+'ml)',
...(S.liquidLogs.length>0?S.liquidLogs.map(l=>'  '+(l.name||'Water')+': '+l.ml+'ml at '+(l.time||'')):['  None logged']),'',
'STOOL LOG ('+S.stoolLogs.length+'):',
...(S.stoolLogs.length>0?S.stoolLogs.map(s2=>'  Type '+s2.type+' · '+s2.color+(s2.assisted?' · Assisted':'')+' — '+BRISTOL[s2.type-1]):['  None logged']),'',
'NOTES:',...(S.noteLogs.length>0?S.noteLogs.map(n=>'  '+n):['  None']),'',
'CONDITIONS: Suspected SIBO (H2/CH4), SIFO, Biliary/Gallbladder dysfunction',
'DIET: GF, dairy-free (except ghee), soy-free, low-FODMAP, low-fat',
'SUPPLEMENTS: Per supplement database in app',
'POSTURE: Anterior pelvic tilt, rounded shoulders, forward head posture, tight pelvic floor'].join('\n');
const bg=div({position:'fixed',inset:'0',background:'rgba(0,0,0,0.35)',zIndex:'150',display:'flex',alignItems:'flex-end',maxWidth:'430px',margin:'0 auto'});
const sheet=div({background:t.surf,borderRadius:'20px 20px 0 0',padding:'20px 18px 40px',width:'100%',boxSizing:'border-box',maxHeight:'80vh',display:'flex',flexDirection:'column'});
const hdr2=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'});hdr2.appendChild(div({fontSize:(sz+4)+'px',fontWeight:'600',color:t.text},[txt('Doctor Report')]));hdr2.appendChild(btn({background:'none',border:'none',fontSize:'20px',color:t.muted,cursor:'pointer'},'×',()=>{S.docOpen=false;renderModal();}));sheet.appendChild(hdr2);
const pre=document.createElement('pre');Object.assign(pre.style,{flex:'1',overflowY:'auto',background:t.surf2,borderRadius:'12px',padding:'12px',fontSize:'9px',color:t.sub,lineHeight:'1.6',whiteSpace:'pre-wrap',marginBottom:'12px',fontFamily:'monospace'});pre.textContent=report;sheet.appendChild(pre);
const cb=btn({width:'100%',padding:'13px',background:a.m,border:'none',borderRadius:'12px',color:'#fff',fontWeight:'600',fontSize:sz+'px',cursor:'pointer'},'Copy for doctor / Claude',()=>{try{navigator.clipboard.writeText(report);cb.textContent='✓ Copied!';cb.style.background='#22C55E';setTimeout(()=>{cb.textContent='Copy for doctor / Claude';cb.style.background=a.m;},2500);}catch(e){}});
sheet.appendChild(cb);bg.appendChild(sheet);return bg;}

// ===== RENDER =====
function renderContent(){const con=document.getElementById('content');con.innerHTML='';const views={home:viewHome,analysis:viewAnalysis,charts:viewCharts,history:viewHistory,library:viewLibrary,database:viewDatabase,progress:viewProgress,settings:viewSettings,tasks:viewTasks};const vfn=views[S.view];if(vfn)con.appendChild(vfn());}

function renderBottomNav(){const nav=document.getElementById('bottomnav');nav.innerHTML='';BOTTOM_NAV.forEach(n=>{const b=document.createElement('button');b.className=S.view===n.id||(n.id==='more'&&['analysis','history','library','database','settings','charts'].includes(S.view))?'active':'';b.innerHTML='<svg viewBox="0 0 24 24">'+n.svg+'</svg><span>'+n.label+'</span>';b.onclick=()=>navTo(n.id);nav.appendChild(b);});}

function renderMorePanel(){const nav=document.getElementById('mp-nav');nav.innerHTML='';MORE_NAV.forEach(n=>{const b=document.createElement('button');Object.assign(b.style,{display:'flex',alignItems:'center',gap:'10px',width:'100%',padding:'10px 12px',background:S.view===n.id?'var(--ac-bg)':'transparent',border:'none',borderRadius:'10px',cursor:'pointer',textAlign:'left',color:S.view===n.id?'var(--ac-t)':'var(--muted)',marginBottom:'2px'});const icon=document.createElement('span');icon.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+n.svg+'</svg>';icon.style.display='flex';icon.style.alignItems='center';b.appendChild(icon);const lbl=document.createElement('span');lbl.style.cssText='font-size:'+z()+'px;font-weight:'+(S.view===n.id?'500':'400');lbl.textContent=n.label;b.appendChild(lbl);b.onclick=()=>navTo(n.id);nav.appendChild(b);});const wt=S.morningData.weight?S.morningData.weight+' kg':'—';document.getElementById('mp-sub').textContent='Sean · '+wt;}

function render(){applyTheme();renderContent();renderBottomNav();renderMorePanel();}

// Init
loadState();render();scheduleAllNotifications();
</script>
