<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Sora',system-ui,sans-serif}
body{background:#F0EFEC;color:#1C1917;font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit;outline:none}
textarea{resize:none}
select{-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2378716C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;width:100%;background:var(--surf2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac,#F59E0B);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
#app{height:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden}
#hdr{padding:14px 18px 10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg);position:relative;z-index:10}
#content{flex:1;overflow-y:auto;padding:14px 18px 96px;scroll-behavior:smooth}
#bottomnav{position:absolute;bottom:0;left:0;right:0;height:68px;background:var(--surf);border-top:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-around;z-index:30;padding-bottom:max(env(safe-area-inset-bottom,0px),10px)}
#bottomnav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;border-radius:10px;transition:all .15s;color:var(--muted);background:none;border:none}
#bottomnav button.active{color:var(--ac)}
#bottomnav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
#bottomnav button span{font-size:10px;font-weight:500;letter-spacing:-.01em}
#morepanel{position:absolute;top:0;right:-260px;width:244px;height:100%;background:var(--surf);z-index:50;transition:right .26s cubic-bezier(.4,0,.2,1);border-left:0.5px solid var(--bdr);display:flex;flex-direction:column}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.2);z-index:40;display:none;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
#toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;z-index:200;display:none}
.sl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin:22px 0 10px}
.chip{display:inline-block;font-size:9px;font-weight:500;padding:2px 7px;border-radius:999px;white-space:nowrap;letter-spacing:.01em}
.mbar{margin-bottom:8px}.mbar-row{display:flex;justify-content:space-between;margin-bottom:3px}.mbar-row span:first-child{font-size:11px;color:var(--muted)}.mbar-row span:last-child{font-size:11px;font-weight:500}.mbar-track{height:4px;background:var(--surf2);border-radius:999px}.mbar-fill{height:100%;border-radius:999px;transition:width .3s ease}
.tog{width:40px;height:22px;border-radius:999px;background:var(--bdr);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer;border:none}.tog.on{background:var(--ac)}.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.1)}.tog.on::after{left:20px}
.fab{position:absolute;bottom:78px;right:18px;width:48px;height:48px;background:var(--ac);border-radius:14px;font-size:24px;color:#fff;display:flex;align-items:center;justify-content:center;z-index:25;box-shadow:0 4px 14px rgba(0,0,0,.15);border:none;cursor:pointer;transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.method-pill{display:inline-block;font-size:9px;padding:1px 6px;border-radius:5px;background:var(--surf2);color:var(--muted);margin-left:4px;font-weight:400}
.card{background:var(--surf);border-radius:14px;border:0.5px solid var(--bdr);overflow:hidden;margin-bottom:10px}
.card-p{padding:var(--pd)}
.dropdown{border:0.5px solid var(--bdr);border-radius:10px;padding:8px 12px;background:var(--surf);color:var(--text);font-size:12px;cursor:pointer}
.dropdown-compact{border:0.5px solid var(--bdr);border-radius:10px;padding:7px 10px;background:var(--surf);color:var(--text);font-size:11px;cursor:pointer;width:auto;max-width:160px;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2378716C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:24px}
.empty-state{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.task-done{text-decoration:line-through;color:var(--muted)!important}
</style>
</head>
<body>
<div id="app">
  <div id="overlay" onclick="closeMore()"></div>
  <div id="morepanel">
    <div style="padding:50px 18px 16px;border-bottom:0.5px solid var(--bdr)">
      <div style="font-size:22px;font-weight:700;color:var(--ac);letter-spacing:-.8px">soma</div>
      <div id="mp-sub" style="font-size:11px;color:var(--muted);margin-top:2px"></div>
    </div>
    <div id="mp-nav" style="flex:1;padding:10px;overflow-y:auto"></div>
    <div style="padding:12px 18px;border-top:0.5px solid var(--bdr);font-size:9px;color:var(--muted);letter-spacing:.02em">soma v5.0</div>
  </div>
  <div id="hdr">
    <span style="font-size:20px;font-weight:700;color:var(--ac);letter-spacing:-.8px">soma</span>
  </div>
  <div id="content"></div>
  <button class="fab" onclick="goLog()">+</button>
  <div id="bottomnav"></div>
  <div id="toast"><div style="background:#1C1917;border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.25)"><span id="toast-msg" style="color:#fff;font-size:12px;font-weight:400"></span><div style="display:flex;gap:10px;align-items:center"><button id="toast-undo" style="color:#F59E0B;font-size:12px;font-weight:600;display:none" onclick="doUndo()">Undo</button><button onclick="hideToast()" style="color:#6B7280;font-size:16px;line-height:1">&times;</button></div></div><div style="height:2px;background:#374151;border-radius:999px;margin-top:3px"><div id="toast-bar" style="height:100%;width:100%;background:#F59E0B;border-radius:999px;transition:width .08s linear"></div></div></div>
  <div id="modal-container"></div>
</div>
<script>
// ===== THEMES & ACCENTS =====
const FONTS={'sora':['Sora','sans-serif'],'dm-sans':['DM Sans','sans-serif'],'jakarta':['Plus Jakarta Sans','sans-serif'],'outfit':['Outfit','sans-serif'],'nunito':['Nunito Sans','sans-serif'],'inter':['Inter','sans-serif']};
// [10] Light theme bg changed to #F0EFEC
const THEMES={light:{bg:'#F0EFEC',surf:'#FFFFFF',surf2:'#F7F7F6',text:'#1C1917',sub:'#44403C',muted:'#9CA3AF',bdr:'#E5E5E4'},dark:{bg:'#161615',surf:'#1E1D1C',surf2:'#272625',text:'#F5F5F4',sub:'#D6D3D1',muted:'#78716C',bdr:'#333230'},warm:{bg:'#FDF8F0',surf:'#FFFBF5',surf2:'#F5ECD9',text:'#2C1810',sub:'#5C3D2E',muted:'#9C7060',bdr:'#E8D5C0'},cool:{bg:'#F0F4F8',surf:'#FFFFFF',surf2:'#E8EFF6',text:'#1E2A3A',sub:'#354A60',muted:'#6B82A0',bdr:'#CDD8E5'}};
const ACCENTS={amber:{m:'#F59E0B',bg:'#FFFBEB',bdr:'#FDE68A',t:'#92400E'},teal:{m:'#14B8A6',bg:'#F0FDFA',bdr:'#99F6E4',t:'#0F766E'},blue:{m:'#3B82F6',bg:'#EFF6FF',bdr:'#BFDBFE',t:'#1D4ED8'},coral:{m:'#F97316',bg:'#FFF7ED',bdr:'#FED7AA',t:'#C2410C'},purple:{m:'#8B5CF6',bg:'#F5F3FF',bdr:'#DDD6FE',t:'#5B21B6'},green:{m:'#22C55E',bg:'#F0FDF4',bdr:'#BBF7D0',t:'#15803D'},rose:{m:'#F43F5E',bg:'#FFF1F2',bdr:'#FECDD3',t:'#BE123C'},slate:{m:'#64748B',bg:'#F8FAFC',bdr:'#CBD5E1',t:'#334155'},gold:{m:'#CA8A04',bg:'#FEFCE8',bdr:'#FEF08A',t:'#713F12'},mint:{m:'#34D399',bg:'#ECFDF5',bdr:'#A7F3D0',t:'#065F46'},crimson:{m:'#DC2626',bg:'#FEF2F2',bdr:'#FECACA',t:'#991B1B'},indigo:{m:'#6366F1',bg:'#EEF2FF',bdr:'#C7D2FE',t:'#3730A3'}};

// ===== PERSISTENCE =====
function saveState(){try{const d={meals:S.todayMeals,symptoms:S.symptomLogs,stool:S.stoolLogs,notes:S.noteLogs,water:S.waterLogs,waterTotal:S.water,activities:S.activityLogs,tasks:S.tasks,morningDoneAt:S.morningDoneAt,morningData:S.morningData,theme:S.theme,accent:S.accent,font:S.font,fontSize:S.fontSize,density:S.density,sections:S.sections,targets:S.targets,days:S.days,savedDate:new Date().toISOString().split('T')[0]};localStorage.setItem('soma_data',JSON.stringify(d));}catch(e){}}
function loadState(){try{const raw=localStorage.getItem('soma_data');if(!raw)return;const d=JSON.parse(raw);const today=new Date().toISOString().split('T')[0];if(d.savedDate===today){S.todayMeals=d.meals||[];S.symptomLogs=d.symptoms||[];S.stoolLogs=d.stool||[];S.noteLogs=d.notes||[];S.waterLogs=d.water||[];S.water=d.waterTotal||0;S.activityLogs=d.activities||[];S.tasks=d.tasks||[];S.morningDoneAt=d.morningDoneAt||null;S.morningData=d.morningData||S.morningData;if(d.days)S.days=d.days;}else{if(d.meals&&d.meals.length>0||d.symptoms&&d.symptoms.length>0||d.activities&&d.activities.length>0){const hist=d.days||[];hist.push({date:d.savedDate,meals:d.meals||[],symptoms:d.symptoms||[],stool:d.stool||[],notes:d.notes||[],water:d.water||[],waterTotal:d.waterTotal||0,morningData:d.morningData,activities:d.activities||[]});S.days=hist;}S.todayMeals=[];S.symptomLogs=[];S.stoolLogs=[];S.noteLogs=[];S.waterLogs=[];S.water=0;S.activityLogs=[];S.morningDoneAt=null;if(d.tasks)S.tasks=d.tasks;}
if(d.theme)S.theme=d.theme;if(d.accent)S.accent=d.accent;if(d.font)S.font=d.font;if(d.fontSize)S.fontSize=d.fontSize;if(d.density)S.density=d.density;if(d.sections)S.sections={...S.sections,...d.sections};if(d.targets)S.targets={...S.targets,...d.targets};}catch(e){}}

// ===== APP STATE =====
const S={view:'home',theme:'light',accent:'amber',font:'sora',fontSize:'normal',density:'comfortable',
sections:{quickLog:true,todaySummary:true,meals:true,symptoms:true,stool:true,notes:true,dttInfo:true},
targets:{calories:2500,protein:105,fat:55,carbs:380,water:2500},
logActive:false,logText:'',logResult:null,logLoading:false,expandedMeal:null,expandedInsight:null,expandedHistory:null,expandedLibMeal:null,
water:0,todayMeals:[],chartMetric:'weight',chartRange:'week',chartOverlay:null,
libTab:'all',libRange:'today',settingsTab:null,
morningOpen:false,morningStep:0,morningData:{tongue:false,tsev:5,reflux:false,indigestion:false,nasal:false,weight:'',sleepQ:'Fair'},morningDoneAt:null,
docOpen:false,docDays:7,searchText:'',moreOpen:false,toastTimer:null,toastUndoFn:null,
symptomLogs:[],stoolLogs:[],noteLogs:[],waterLogs:[],activityLogs:[],
tasks:[],expandedTask:null,
days:[],progressRange:'weekly',insightsViewed:false};

function T(){return THEMES[S.theme]||THEMES.light;}
function A(){return ACCENTS[S.accent]||ACCENTS.amber;}
function z(){return S.fontSize==='large'?16:S.fontSize==='small'?12:14;}
function pd(){return S.density==='compact'?10:S.density==='spacious'?18:14;}
function ff(){const f=FONTS[S.font]||FONTS.sora;return f[0]+','+f[1];}

function applyTheme(){
const t=T(),a=A(),r=document.documentElement.style;
r.setProperty('--bg',t.bg);r.setProperty('--surf',t.surf);r.setProperty('--surf2',t.surf2);r.setProperty('--text',t.text);r.setProperty('--sub',t.sub);r.setProperty('--muted',t.muted);r.setProperty('--bdr',t.bdr);r.setProperty('--ac',a.m);r.setProperty('--ac-bg',a.bg);r.setProperty('--ac-bdr',a.bdr);r.setProperty('--ac-t',a.t);r.setProperty('--pd',pd()+'px');
document.body.style.background=t.bg;document.body.style.color=t.text;document.body.style.fontSize=z()+'px';document.body.style.fontFamily=ff();
document.getElementById('toast-bar').style.background=a.m;
const ub=document.getElementById('toast-undo');if(ub)ub.style.color=a.m;
}

// ===== FOOD DATABASE & PARSING =====
const COOK_WORDS=['fried','boiled','grilled','steamed','roasted','poached','scrambled','baked','sauteed','mashed','blended','raw','smoked','braised'];
const CONDIMENTS=new Set(['ghee','olive oil','evoo','coconut oil','butter','extra virgin olive oil','clarified butter']);

const FDB=[{n:'chicken breast',v:[165,31,0,3.6,0,0],a:['chicken','breast'],defG:165},{n:'chicken mince',v:[163,28,0,5,0,0],a:['mince chicken','minced chicken'],defG:150},{n:'chicken thigh',v:[177,24,0,9,0,0],a:['thigh'],defG:150},{n:'turkey',v:[135,30,0,1,0,0],a:['turkey breast','turkey mince'],defG:150},{n:'pollock',v:[92,20,0,1,0,0],a:['pollock fillet'],defG:150},{n:'cod',v:[82,18,0,0.7,0,0],a:['cod fillet'],defG:150},{n:'salmon',v:[208,20,0,13,0,0],a:['salmon fillet'],defG:150},{n:'tuna',v:[132,29,0,1,0,0],a:['tuna steak','canned tuna'],defG:150},{n:'haddock',v:[89,19,0,0.9,0,0],a:[],defG:150},{n:'sea bass',v:[97,18,0,2,0,0],a:['seabass'],defG:150},{n:'mackerel',v:[205,19,0,14,0,0],a:['smoked mackerel'],defG:150},{n:'prawns',v:[99,21,0,1.5,0,0],a:['shrimp','king prawns'],defG:100},{n:'white fish',v:[90,19,0,1,0,0],a:['fish fillet','fish'],defG:150},{n:'egg',v:[155,13,1.1,11,0.6,0],a:['eggs','whole egg','free range egg','medium egg','large egg'],gpu:70,u:'egg',defG:70},{n:'egg white',v:[52,11,0.7,0.2,0.5,0],a:['egg whites'],defG:33},{n:'white rice',v:[130,2.7,28,0.3,0,0.4],a:['rice','basmati','basmati rice','jasmine rice'],cupG:186,defG:185},{n:'brown rice',v:[123,2.6,26,1,0,1.8],a:['brown basmati'],cupG:195,defG:185},{n:'oats',v:[389,17,66,7,0,10],a:['porridge','rolled oats','oatmeal'],cupG:81,defG:40},{n:'pasta',v:[158,5.8,31,0.9,0.6,1.8],a:['spaghetti','penne'],cupG:140,defG:180},{n:'sweet potato',v:[86,1.6,20,0.1,4.2,3],a:['sweet potato mash','sweetpotato'],cupG:200,defG:200},{n:'potato',v:[77,2,17,0.1,0.8,2.2],a:['white potato','mashed potato','boiled potato','potatoes'],cupG:170,defG:200},{n:'courgette',v:[17,1.2,3.1,0.3,2.5,1],a:['zucchini','courgettes'],defG:150},{n:'broccoli',v:[34,2.8,7,0.4,1.7,2.6],a:['broccoli florets'],cupG:90,defG:80},{n:'spinach',v:[23,2.9,3.6,0.4,0.4,2.2],a:['baby spinach'],cupG:30,defG:80},{n:'carrot',v:[41,0.9,10,0.2,4.7,2.8],a:['carrots'],cupG:128,defG:80},{n:'banana',v:[89,1.1,23,0.3,12,2.6],a:['bananas'],defG:120},{n:'avocado',v:[160,2,9,15,0.7,6.7],a:['avocados'],defG:80},{n:'ghee',v:[900,0,0,100,0,0],a:['clarified butter'],gpu:5,u:'tsp',defG:5},{n:'olive oil',v:[884,0,0,100,0,0],a:['evoo','extra virgin olive oil','oil'],gpu:5,u:'tsp',defG:5},{n:'coconut oil',v:[862,0,0,100,0,0],a:[],gpu:5,u:'tsp',defG:5},{n:'butter',v:[717,0.9,0.1,81,0.1,0],a:['unsalted butter'],gpu:5,u:'tsp',defG:5},{n:'honey',v:[304,0.3,82,0,82,0.2],a:['raw honey'],gpu:21,u:'tbsp',defG:21},{n:'whey protein',v:[113,23,4,2,3,0],a:['protein powder','whey'],gpu:30,u:'scoop',defG:30},{n:'bone broth',v:[10,2,0.5,0.1,0,0],a:['stock','chicken stock'],cupG:240,defG:240},{n:'date',v:[277,1.8,75,0.2,63,6.7],a:['dates','medjool date','medjool dates'],gpu:24,u:'date',defG:24},{n:'ginger',v:[80,1.8,18,0.8,1.7,2],a:['fresh ginger'],defG:5},{n:'ginger tea',v:[2,0,0.5,0,0.2,0],a:['ginger tea'],cupG:240,defG:240}];

function findFood(w){const s=w.toLowerCase().trim().replace(/s$/,'');let cl=s;COOK_WORDS.forEach(cw=>{cl=cl.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});cl=cl.replace(/\s+/g,' ').trim();if(!cl)return null;return FDB.find(f=>f.n===cl||f.n===s||cl.includes(f.n)||f.n.includes(cl)||(f.a&&f.a.some(a=>a===cl||a===s||cl.includes(a)||a.includes(cl))));}
function extractCook(text){const l=text.toLowerCase();for(const cw of COOK_WORDS){if(l.includes(cw))return cw.charAt(0).toUpperCase()+cw.slice(1);}return null;}
function tc(s){return s.replace(/\b\w/g,c=>c.toUpperCase());}

function cleanName(n){
  let c=n.toLowerCase();
  const protectedNames=['sweet potato','white rice','brown rice','sea bass','bone broth','egg white','white fish','coconut oil','olive oil','ginger tea'];
  const placeholders={};
  protectedNames.forEach((pn,i)=>{
    const ph='__PROT'+i+'__';
    if(c.includes(pn)){placeholders[ph]=pn;c=c.replace(new RegExp(pn,'g'),ph);}
  });
  COOK_WORDS.forEach(cw=>{c=c.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});
  c=c.replace(/\bat\b/gi,'').trim();
  Object.entries(placeholders).forEach(([ph,orig])=>{c=c.replace(new RegExp(ph,'g'),orig);});
  return tc(c.replace(/\s+/g,' ').trim());
}

function calcDTT(m){let b=(m.texture||'')==='Slurry'?1.5:(m.texture||'')==='Mashed'?2:(m.texture||'')==='Soft'?2.5:3;if((m.fat||0)>15)b+=1;else if((m.fat||0)>8)b+=0.5;if((m.cals||0)>600)b+=0.5;return b.toFixed(1);}
// [5] macroLvl returns vibrant colors, no pill needed
function macroLvl(mk,v){const T2={calories:[500,300],protein:[35,20],carbs:[60,30],fat:[8,4],sugar:[8,4],fibre:[5,2]};const[hi,md]=T2[mk]||[100,50];return v>=hi?{l:'High',c:'#DC2626'}:v>=md?{l:'Med',c:'#D97706'}:{l:'Low',c:'#16A34A'};}

// ===== STRIP TIME & DATE from text before parsing =====
function stripTime(text){
  return text
    .replace(/\bat\s+\d{1,2}(:\d{2})?\s*(am|pm)\b/gi,'')
    .replace(/\bat\s+\d{1,2}:\d{2}\b/gi,'')
    .replace(/^\d{1,2}\s*(am|pm)\s*/i,'')
    .replace(/^\d{1,2}:\d{2}\s*(am|pm)?\s*/i,'')
    .replace(/\s+/g,' ').trim();
}

// [3] Strip date references from text
function stripDateRef(text){
  return text
    .replace(/\b(?:on\s+)?\d{1,2}\s+(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\b/gi,'')
    .replace(/\byesterday\b/gi,'')
    .replace(/\s+/g,' ').trim();
}

// [3] Parse target date from text
function parseTargetDate(text){
  const l=text.toLowerCase();
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];

  if(/\byesterday\b/i.test(l)){
    const yd=new Date(today);yd.setDate(yd.getDate()-1);
    return yd.toISOString().split('T')[0];
  }
  const dm=l.match(/(?:on\s+)?(\d{1,2})\s+(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)/i);
  if(dm){
    const day=parseInt(dm[1]);
    const monthNames={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const mKey=dm[2].substring(0,3).toLowerCase();
    const month=monthNames[mKey];
    if(month!==undefined){
      const year=today.getFullYear();
      const target=new Date(year,month,day);
      const tStr=target.toISOString().split('T')[0];
      if(tStr<todayStr)return tStr;
      if(tStr===todayStr)return null; // today
    }
  }
  return null; // today
}

// ===== MEAL PARSER (local fallback) =====
function parseMeal(text){
const low=text.toLowerCase();
let time=null;
const timePatterns=[
  /^(\d{1,2})\s*(am|pm)\b/i,
  /^(\d{1,2}):(\d{2})\s*(am|pm)?\b/i,
  /\bat\s+(\d{1,2})\s*(am|pm)\b/i,
  /\bat\s+(\d{1,2}):(\d{2})\s*(am|pm)?\b/i
];
for(const pat of timePatterns){
  const tm=low.match(pat);
  if(tm){
    if(pat===timePatterns[0]||pat===timePatterns[2]){
      let h2=+tm[1];const ap=tm[2]?tm[2].toLowerCase():null;
      if(ap==='pm'&&h2<12)h2+=12;if(ap==='am'&&h2===12)h2=0;
      time=(h2<10?'0':'')+h2+':00';
    }else{
      let h2=+tm[1];const min=tm[2]||'00';const ap=tm[3]?tm[3].toLowerCase():null;
      if(ap==='pm'&&h2<12)h2+=12;if(ap==='am'&&h2===12)h2=0;
      time=(h2<10?'0':'')+h2+':'+min;
    }
    break;
  }
}
if(!time){const tm2=low.match(/\bat\s+(\d{1,2}:\d{2})/);if(tm2)time=tm2[1];}
if(!time)time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

const cleaned=stripDateRef(stripTime(text)).toLowerCase();
const method=extractCook(text);
let k=0,p=0,c=0,f=0,s=0,fi=0;
const ings=[],ingMethods=[],done=new Set(),ingFoodNames=[];
const addF=(fd,g,label,cm)=>{if(!fd||done.has(fd.n))return;const[fk,fp,fc,ff2,fs,ffi]=fd.v;k+=fk*g/100;p+=fp*g/100;c+=fc*g/100;f+=ff2*g/100;s+=fs*g/100;fi+=ffi*g/100;ings.push(label);ingMethods.push(cm||method||null);ingFoodNames.push(fd.n);done.add(fd.n);};

for(const m of cleaned.matchAll(/(\d+(?:\.\d+)?)\s*g\s+(?:of\s+)?([a-z][a-z ]+?)(?=\s*(?:and|,|\+|\d|all|boiled|grilled|steamed|mashed|blended|roasted|fried|at|$))/gi)){
  addF(findFood(m[2].trim()),+m[1],cleanName(m[2].trim())+': '+m[1]+'g',extractCook(m[2]));
}
for(const m of cleaned.matchAll(/(\d+(?:\.\d+)?)\s+cups?\s+(?:of\s+)?([a-z][a-z ]+?)(?=\s*(?:and|,|\+|\d|$))/gi)){
  const fd=findFood(m[2].trim());if(fd&&fd.cupG)addF(fd,+m[1]*fd.cupG,cleanName(m[2].trim())+': '+m[1]+' cup'+(+m[1]!==1?'s':''));
}
const em=cleaned.match(/(\d+)\s+(?:(fried|boiled|scrambled|poached)\s+)?eggs?/);
if(em){const fd=findFood('egg');if(fd&&fd.gpu){addF(fd,+em[1]*fd.gpu,'Egg'+(+em[1]>1?'s':'')+' x'+em[1],em[2]?tc(em[2]):method);}}
if(!em){const em2=cleaned.match(/(?:^|\s)(?:(fried|boiled|scrambled|poached)\s+)?eggs?(?:\s|$|,)/);if(em2){const fd=findFood('egg');if(fd&&fd.gpu)addF(fd,fd.gpu,'Egg x1',em2[1]?tc(em2[1]):method);}}
for(const m of cleaned.matchAll(/(\d+(?:\.\d+)?)\s+tsps?\s+(?:of\s+)?([a-z][a-z ]+?)(?=\s*(?:and|,|\+|\d|$))/gi)){
  const fd=findFood(m[2].trim());if(fd&&fd.gpu)addF(fd,+m[1]*fd.gpu,cleanName(m[2].trim())+': '+m[1]+' tsp');
}
for(const m of cleaned.matchAll(/(\d+(?:\.\d+)?)\s+tbsps?\s+(?:of\s+)?([a-z][a-z ]+?)(?=\s*(?:and|,|\+|\d|$))/gi)){
  const fd=findFood(m[2].trim());if(fd)addF(fd,+m[1]*15,cleanName(m[2].trim())+': '+m[1]+' tbsp');
}
for(const m of cleaned.matchAll(/(\d+)\s*ml\s+(?:of\s+)?([a-z][a-z ]+?)(?=\s*(?:and|,|\+|\d|$))/gi)){
  const fd=findFood(m[2].trim());if(fd)addF(fd,+m[1],cleanName(m[2].trim())+': '+m[1]+'ml');
}
const dm=cleaned.match(/(\d+)\s+(?:medjool\s+)?dates?/);
if(dm&&!done.has('date')){const fd=findFood('date');if(fd&&fd.gpu)addF(fd,+dm[1]*fd.gpu,'Medjool Date'+(+dm[1]>1?'s':'')+' x'+dm[1]);}

if(ings.length===0){
  const parts=cleaned.split(/\s+and\s+|,|\+/).map(p2=>p2.trim()).filter(Boolean);
  parts.forEach(part=>{
    const pm=extractCook(part);let cl2=part;
    COOK_WORDS.forEach(cw=>{cl2=cl2.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});
    cl2=cl2.replace(/\s+/g,' ').trim();
    if(!cl2)return;
    const nm=cl2.match(/^(\d+)\s+(.+)/);
    const fd=findFood(nm?nm[2]:cl2);
    if(fd){let g=fd.defG||100;if(nm&&fd.gpu)g=+nm[1]*fd.gpu;else if(nm)g=+nm[1];addF(fd,g,cleanName(nm?nm[2]:cl2)+': '+Math.round(g)+'g',pm);}
  });
}

const cm=method||'Not specified';
const tex=cm.includes('blend')?'Slurry':cm.includes('mash')||cm.includes('Mash')?'Mashed':'Soft';
const fr=Math.round(f);

const mealName=(()=>{
  const names=ings.map((i2,idx)=>{
    const foodName=ingFoodNames[idx]||'';
    if(CONDIMENTS.has(foodName.toLowerCase()))return null;
    let raw=i2.split(':')[0].split('x')[0].replace(/[0-9]/g,'').trim();
    return cleanName(raw);
  }).filter(n2=>n2&&n2.length>1);
  if(!names.length)return'Logged Meal';
  if(names.length===1)return names[0];
  if(names.length===2)return names[0]+' & '+names[1];
  return names.slice(0,-1).join(', ')+' & '+names[names.length-1];
})();

return{name:mealName,ingredients:ings.length>0?ings:['From description: '+text.slice(0,50)],ingredientMethods:ingMethods,cals:Math.round(k)||null,protein:Math.round(p)||null,carbs:Math.round(c)||null,fat:fr||null,sugar:Math.round(s)||null,fibre:+(fi.toFixed(1))||null,time,texture:tex,fatLevel:fr>10?'High':fr>5?'Medium':'Low',cookingMethod:cm};}

const SKW=['heartburn','cramp','pain','bloat','nausea','reflux','burn','ache','tired','fatigue','fog','coating','dizzy','constip','diarrh','vomit','wind','gas','itch','rash','indigestion','red skin'];
const MKW=['rice','chicken','fish','pollock','cod','egg','potato','ghee','oil','cup','gram','ate','meal','breakfast','lunch','dinner','cooked','boiled','blended','slurry','mash','salmon','tuna','turkey','sweet','carrot','banana','oats','porridge','pasta','avocado','honey','date','prawn','haddock','mackerel','broccoli','spinach','whey','protein'];
const WKW=['water','hydrat','drink','glass','bottle'];
const STOOL_KW=['stool','bristol','type 1','type 2','type 3','type 4','type 5','type 6','type 7','bowel movement','poo'];
// [4] Activity keywords
const AKW=['sauna','steam','walk','swim','exercise','gym','run','meditation','meditate','cold','stress','stressful','breathwork','yoga','stretch'];

function detectType(text){
  const l=text.toLowerCase();
  const w=WKW.filter(x=>l.includes(x)).length;
  const st=STOOL_KW.filter(x=>l.includes(x)).length;
  const sm=SKW.filter(x=>l.includes(x)).length;
  const m=MKW.filter(x=>l.includes(x)).length;
  const ac=AKW.filter(x=>l.includes(x)).length;
  if(w>0&&m===0)return'water';
  if(w>0&&/\b\d+\s*(?:ml|litre|liter|l\b|glass)/i.test(l)&&l.includes('water'))return'water';
  if(st>0&&m===0)return'stool';
  // [4] Check activity before meal
  if(ac>0&&m===0&&sm===0)return'activity';
  const foodMatch=findFood(stripDateRef(stripTime(text)));
  if(m>0||foodMatch)return'meal';
  if(sm>0)return'symptom';
  return'note';
}

function parseSymptom(text){const l=text.toLowerCase();let sym=null,level=null,duration=null,time=null;
const symMap={cramping:/cramp/,burn:/burn/,reflux:/reflux|heartburn/,bloating:/bloat/,fatigue:/fatigue|tired/,brainfog:/brain\s*fog|fog/,dryskin:/dry\s*skin|skin/,tongue:/tongue|coating/,indigestion:/indigestion/,nasal:/nasal|congestion/,redskin:/red\s*skin|redness/};

const tmm=l.match(/(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))/i);
if(tmm){
  let raw=tmm[1];const ap=raw.match(/(am|pm)/i);let h2=parseInt(raw);const minM=raw.match(/:(\d{2})/);const min=minM?minM[1]:'00';
  if(ap&&ap[1].toLowerCase()==='pm'&&h2<12)h2+=12;if(ap&&ap[1].toLowerCase()==='am'&&h2===12)h2=0;
  time=(h2<10?'0':'')+h2+':'+min;
}else{const tmm2=l.match(/at\s+(\d{1,2}:\d{2})/);if(tmm2)time=tmm2[1];else time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
return{symptom:sym,level,duration,time,raw:text};}

// [4] Parse activity
function parseActivity(text){
  const l=text.toLowerCase();
  let activity=null;
  const actMap={'sauna':/sauna/,'steam room':/steam/,'walk':/walk/,'swim':/swim/,'exercise':/exercise|gym/,'run':/\brun\b/,'meditation':/meditat/,'cold water':/cold/,'breathwork':/breathwork/,'yoga':/yoga/,'stretch':/stretch/,'stressful event':/stress/};
  for(const[k2,re] of Object.entries(actMap)){if(re.test(l)){activity=k2;break;}}
  let duration=null;
  const dm=l.match(/(?:for\s+)?(\d+)\s*(min|hour|hr)/i);
  if(dm)duration=dm[1]+' '+dm[2]+(+dm[1]>1?'s':'');
  let time=null;
  const tmm=l.match(/(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))/i);
  if(tmm){let raw=tmm[1];const ap=raw.match(/(am|pm)/i);let h2=parseInt(raw);const minM=raw.match(/:(\d{2})/);const min=minM?minM[1]:'00';if(ap&&ap[1].toLowerCase()==='pm'&&h2<12)h2+=12;if(ap&&ap[1].toLowerCase()==='am'&&h2===12)h2=0;time=(h2<10?'0':'')+h2+':'+min;}
  if(!time)time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  return{activity:activity?tc(activity):'Activity',duration,time,note:null};
}

function bristolSVG(type,size){size=size||26;const col=type===3||type===4?'#22C55E':type<=2?'#92400E':'#EF4444';let inner='';if(type===1)inner=[7,15,23].map(x=>'<circle cx="'+x+'" cy="16" r="4" fill="'+col+'" opacity="0.8"/>').join('');else if(type===2)inner='<ellipse cx="16" cy="16" rx="13" ry="7" fill="'+col+'" opacity="0.75"/>';else if(type===3)inner='<ellipse cx="16" cy="16" rx="13" ry="7" fill="'+col+'" opacity="0.85"/>';else if(type===4)inner='<ellipse cx="16" cy="16" rx="14" ry="7" fill="'+col+'" opacity="0.9"/>';else if(type===5)inner=[7,13,19,10,16].map((x,i)=>'<ellipse cx="'+x+'" cy="'+(i%2===0?13:19)+'" rx="4" ry="3" fill="'+col+'" opacity="0.7"/>').join('');else if(type===6)inner='<ellipse cx="16" cy="16" rx="13" ry="9" fill="'+col+'" opacity="0.5"/>';else inner='<ellipse cx="16" cy="19" rx="13" ry="4" fill="'+col+'" opacity="0.45"/>';const s3=document.createElement('span');s3.innerHTML='<svg width="'+size+'" height="'+size+'" viewBox="0 0 32 32">'+inner+'</svg>';return s3.firstChild;}

function getLibData(){
  const range=S.libRange||'today';
  if(range==='today'){
    return{meals:S.todayMeals||[],symptoms:S.symptomLogs||[],stool:S.stoolLogs||[],notes:S.noteLogs||[],water:S.waterLogs||[],activities:S.activityLogs||[]};
  }
  if(range==='yesterday'){
    const yd=S.days.length>0?S.days[S.days.length-1]:null;
    if(!yd)return{meals:[],symptoms:[],stool:[],notes:[],water:[],activities:[]};
    return{meals:yd.meals||[],symptoms:yd.symptoms||[],stool:yd.stool||[],notes:yd.notes||[],water:yd.water||[],activities:yd.activities||[]};
  }
  const now=new Date();
  const cutoff=range==='week'?new Date(now.getTime()-7*86400000):new Date(now.getTime()-30*86400000);
  const cutoffStr=cutoff.toISOString().split('T')[0];
  let meals=[],symptoms=[],stool=[],notes=[],water=[],activities=[];
  meals=meals.concat(S.todayMeals||[]);symptoms=symptoms.concat(S.symptomLogs||[]);stool=stool.concat(S.stoolLogs||[]);notes=notes.concat(S.noteLogs||[]);water=water.concat(S.waterLogs||[]);activities=activities.concat(S.activityLogs||[]);
  (S.days||[]).forEach(d=>{
    if(d.date>=cutoffStr){
      meals=meals.concat(d.meals||[]);symptoms=symptoms.concat(d.symptoms||[]);stool=stool.concat(d.stool||[]);notes=notes.concat(d.notes||[]);water=water.concat(d.water||[]);activities=activities.concat(d.activities||[]);
    }
  });
  return{meals,symptoms,stool,notes,water,activities};
}

// [1] Helper to delete from any date range
function deleteFromRange(type,index){
  const range=S.libRange||'today';
  if(range==='today'){
    if(type==='meals')S.todayMeals.splice(index,1);
    else if(type==='symptoms')S.symptomLogs.splice(index,1);
    else if(type==='stool')S.stoolLogs.splice(index,1);
    else if(type==='water')S.waterLogs.splice(index,1);
    else if(type==='activities')S.activityLogs.splice(index,1);
    else if(type==='notes')S.noteLogs.splice(index,1);
  }else if(range==='yesterday'){
    const yd=S.days.length>0?S.days[S.days.length-1]:null;
    if(yd){
      if(type==='meals'&&yd.meals)yd.meals.splice(index,1);
      else if(type==='symptoms'&&yd.symptoms)yd.symptoms.splice(index,1);
      else if(type==='stool'&&yd.stool)yd.stool.splice(index,1);
      else if(type==='water'&&yd.water)yd.water.splice(index,1);
      else if(type==='activities'&&yd.activities)yd.activities.splice(index,1);
      else if(type==='notes'&&yd.notes)yd.notes.splice(index,1);
    }
  }else{
    // week/month — need to find which day the entry belongs to by counting through
    const now=new Date();
    const cutoff=range==='week'?new Date(now.getTime()-7*86400000):new Date(now.getTime()-30*86400000);
    const cutoffStr=cutoff.toISOString().split('T')[0];
    // First count today's entries
    let todayCount=0;
    if(type==='meals')todayCount=(S.todayMeals||[]).length;
    else if(type==='symptoms')todayCount=(S.symptomLogs||[]).length;
    else if(type==='stool')todayCount=(S.stoolLogs||[]).length;
    else if(type==='water')todayCount=(S.waterLogs||[]).length;
    else if(type==='activities')todayCount=(S.activityLogs||[]).length;
    else if(type==='notes')todayCount=(S.noteLogs||[]).length;
    if(index<todayCount){
      deleteFromRange_inner('today',type,index);return;
    }
    let offset=todayCount;
    for(const day of S.days){
      if(day.date<cutoffStr)continue;
      let arr=[];
      if(type==='meals')arr=day.meals||[];
      else if(type==='symptoms')arr=day.symptoms||[];
      else if(type==='stool')arr=day.stool||[];
      else if(type==='water')arr=day.water||[];
      else if(type==='activities')arr=day.activities||[];
      else if(type==='notes')arr=day.notes||[];
      if(index<offset+arr.length){arr.splice(index-offset,1);break;}
      offset+=arr.length;
    }
  }
  saveState();render();
}
function deleteFromRange_inner(r,type,index){
  if(type==='meals')S.todayMeals.splice(index,1);
  else if(type==='symptoms')S.symptomLogs.splice(index,1);
  else if(type==='stool')S.stoolLogs.splice(index,1);
  else if(type==='water')S.waterLogs.splice(index,1);
  else if(type==='activities')S.activityLogs.splice(index,1);
  else if(type==='notes')S.noteLogs.splice(index,1);
}

// [3] Updated AI system prompt with targetDate and activity support
const AI_SYSTEM_PROMPT=`You are a nutrition parser for a health tracking app. Parse the user's log entry and return ONLY valid JSON.

Detect type: meal, water, symptom, stool, activity, or note.

For meals, calculate accurate macros using standard nutritional databases. For branded foods use standard values.
Never include ghee, olive oil, coconut oil, or butter in the meal name — they go in ingredients only.
Extract cooking method per ingredient. Extract time if mentioned (format HH:MM 24hr).

If the entry mentions a past date (e.g. "yesterday", "on 25 march"), include a "targetDate" field with the ISO date string (YYYY-MM-DD). If no past date is mentioned, omit targetDate (defaults to today). Today is ${new Date().toISOString().split('T')[0]}.

Return this exact JSON structure (omit irrelevant fields):
{
  "type": "meal",
  "targetDate": "2026-03-25",
  "meal": {
    "name": "Chicken Breast & Rice",
    "time": "11:00",
    "cookingMethod": "Boiled",
    "texture": "Soft",
    "fatLevel": "Low",
    "cals": 450,
    "protein": 42,
    "carbs": 55,
    "fat": 4,
    "sugar": 0,
    "fibre": 0.5,
    "ingredients": ["Chicken Breast: 150g", "White Rice: 200g"],
    "ingredientMethods": ["Boiled", "Boiled"]
  }
}

For water: { "type": "water", "ml": 500 }
For symptom: { "type": "symptom", "symptom": "cramping", "level": 4, "duration": "10 mins", "time": "14:00", "raw": "..." }
For stool: { "type": "stool", "stoolType": 4, "color": "Brown", "assisted": false }
For activity: { "type": "activity", "activity": "Sauna", "duration": "30 mins", "intensity": "moderate", "note": "went after lunch", "time": "14:00" }
For note: { "type": "note", "text": "..." }

Return ONLY JSON. No markdown. No explanation.`;

async function aiParse(text){
  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:400,
        system:AI_SYSTEM_PROMPT,
        messages:[{role:"user",content:text}]
      })
    });
    if(!response.ok)throw new Error('API '+response.status);
    const data=await response.json();
    const raw=data.content.map(i=>i.text||'').join('').trim();
    const clean=raw.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  }catch(e){
    console.error('AI parse failed, falling back to local:',e);
    return null;
  }
}

// [3] Helper to log to a past date
function logToPastDate(targetDate,type,entry){
  let day=S.days.find(d=>d.date===targetDate);
  if(!day){
    day={date:targetDate,meals:[],symptoms:[],stool:[],notes:[],water:[],waterTotal:0,activities:[]};
    S.days.push(day);
    S.days.sort((a,b)=>a.date.localeCompare(b.date));
  }
  if(!day.activities)day.activities=[];
  if(type==='meal')(day.meals=day.meals||[]).unshift(entry);
  else if(type==='symptom')(day.symptoms=day.symptoms||[]).push(entry);
  else if(type==='stool')(day.stool=day.stool||[]).push(entry);
  else if(type==='water'){(day.water=day.water||[]).push(entry);day.waterTotal=(day.waterTotal||0)+entry.ml;}
  else if(type==='activity')(day.activities=day.activities||[]).push(entry);
  else if(type==='note')(day.notes=day.notes||[]).push(entry);
  showToast('Logged to '+targetDate,null);
}

function processAIResult(res,rawText,targetDate){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];
  if(res.type==='meal'&&res.meal){
    const m=res.meal;
    if(!m.time)m.time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    if(!m.texture)m.texture='Soft';
    if(!m.fatLevel)m.fatLevel=(m.fat||0)>10?'High':(m.fat||0)>5?'Medium':'Low';
    if(!m.cookingMethod)m.cookingMethod='Not specified';
    if(!m.ingredientMethods)m.ingredientMethods=(m.ingredients||[]).map(()=>m.cookingMethod);
    if(isPast){logToPastDate(targetDate,'meal',m);}
    else{S.todayMeals=[m,...S.todayMeals];}
    S.logResult={type:'meal',meal:m};
    if(!isPast)showToast(m.name+' logged',null);
  }else if(res.type==='water'){
    const ml=res.ml||250;
    if(isPast){logToPastDate(targetDate,'water',{ml,time:getNow()});}
    else{S.water+=ml;S.waterLogs.push({ml,time:getNow()});}
    S.logResult={type:'water',ml};if(!isPast)showToast(ml+'ml water logged',null);
  }else if(res.type==='symptom'){
    const parsed={symptom:res.symptom||null,level:res.level||null,duration:res.duration||null,time:res.time||getNow(),raw:rawText};
    if(isPast){logToPastDate(targetDate,'symptom',parsed);}
    else{S.symptomLogs.push(parsed);}
    S.logResult={type:'symptom',text:rawText,time:parsed.time};if(!isPast)showToast('Symptom logged',null);
  }else if(res.type==='stool'){
    const stool={type:res.stoolType||4,color:res.color||'Brown',assisted:res.assisted||false,note:null,time:getNow()};
    if(isPast){logToPastDate(targetDate,'stool',stool);}
    else{S.stoolLogs.push(stool);}
    S.logResult={type:'stool',stool};if(!isPast)showToast('Stool logged — Type '+stool.type,null);
  }else if(res.type==='activity'){
    const act={activity:res.activity||'Activity',duration:res.duration||null,intensity:res.intensity||null,note:res.note||null,time:res.time||getNow()};
    if(isPast){logToPastDate(targetDate,'activity',act);}
    else{S.activityLogs.push(act);}
    S.logResult={type:'activity',activity:act.activity};if(!isPast)showToast(act.activity+' logged',null);
  }else if(res.type==='note'){
    const noteText=res.text||rawText;
    if(isPast){logToPastDate(targetDate,'note',noteText);}
    else{S.noteLogs.push(noteText);}
    S.logResult={type:'note',text:noteText};if(!isPast)showToast('Note saved',null);
  }
}

function processLocalPart(text,targetDate){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];
  const type=detectType(text);
  if(type==='meal'){
    const meal=parseMeal(text);
    if(isPast){logToPastDate(targetDate,'meal',meal);}
    else{S.todayMeals=[meal,...S.todayMeals];}
    S.logResult={type:'meal',meal};if(!isPast)showToast(meal.name+' logged',null);
  }else if(type==='water'){
    const ml=parseWater(text);
    if(isPast){logToPastDate(targetDate,'water',{ml,time:getNow()});}
    else{S.water+=ml;S.waterLogs.push({ml,time:getNow()});}
    S.logResult={type:'water',ml};if(!isPast)showToast(ml+'ml water logged',null);
  }else if(type==='stool'){
    const stool=parseStool(text);
    if(isPast){logToPastDate(targetDate,'stool',stool);}
    else{S.stoolLogs.push(stool);}
    S.logResult={type:'stool',stool};if(!isPast)showToast('Stool logged — Type '+stool.type,null);
  }else if(type==='symptom'){
    const parsed=parseSymptom(text);
    if(isPast){logToPastDate(targetDate,'symptom',parsed);}
    else{S.symptomLogs.push(parsed);}
    S.logResult={type:'symptom',text,time:parsed.time};if(!isPast)showToast('Symptom logged',null);
  }else if(type==='activity'){
    const act=parseActivity(text);
    if(isPast){logToPastDate(targetDate,'activity',act);}
    else{S.activityLogs.push(act);}
    S.logResult={type:'activity',activity:act.activity};if(!isPast)showToast(act.activity+' logged',null);
  }else{
    if(isPast){logToPastDate(targetDate,'note',text);}
    else{S.noteLogs.push(text);}
    S.logResult={type:'note',text};if(!isPast)showToast('Note saved',null);
  }
}

function splitLogEntry(text){
  const sentences=text.split(/(?<=[.!])\s+/).filter(s2=>s2.trim().length>0);
  if(sentences.length>1)return sentences.map(s2=>({text:s2.trim()}));
  const parts=text.split(/\.\s+/).filter(s2=>s2.trim().length>0);
  if(parts.length>1)return parts.map(s2=>({text:s2.trim()}));
  return[{text}];
}

// Notification scheduling
const notifTimeouts=new Map();
function scheduleNotification(tk){
  if(notifTimeouts.has(tk.id)){clearTimeout(notifTimeouts.get(tk.id));notifTimeouts.delete(tk.id);}
  if(!tk.notificationTime||tk.completed)return;
  if(!('Notification' in window))return;
  if(Notification.permission==='default')Notification.requestPermission();
  const[h2,m]=tk.notificationTime.split(':').map(Number);
  const now=new Date();
  const target=new Date(now);target.setHours(h2,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const delay=target.getTime()-now.getTime();
  const tid=setTimeout(()=>{
    if(Notification.permission==='granted'){new Notification('Soma — '+tk.title,{body:'Time for: '+tk.title});}
    notifTimeouts.delete(tk.id);
  },delay);
  notifTimeouts.set(tk.id,tid);
}

const prof=div({});prof.className='card card-p';
[['Name','Sean'],['Age','24'],['Height','5\'11" (180cm)'],['Goal weight','70 kg']].forEach(([k2,v],i,arr)=>{
  const row=div({display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:i<arr.length-1?'0.5px solid '+t.bdr:'none'});
  row.appendChild(div({fontSize:(sz-1)+'px',color:t.muted},[txt(k2)]));
  row.appendChild(div({fontSize:(sz-1)+'px',fontWeight:'500',color:t.text},[txt(v)]));
  prof.appendChild(row);
});wrap.appendChild(prof);

wrap.appendChild(sl('Conditions'));
const cond=div({});cond.className='card card-p';
['Suspected SIBO (Hydrogen/Methane)','Suspected SIFO (Fungal)','Biliary/Gallbladder dysfunction','Elevated ALT (206 — active)','Neutropenia (0.7 — monitor)','Anterior pelvic tilt','Tight pelvic floor'].forEach((c2,i,arr)=>{
  cond.appendChild(div({fontSize:(sz-1)+'px',color:t.sub,padding:'6px 0',borderBottom:i<arr.length-1?'0.5px solid '+t.bdr:'none'},[txt(c2)]));
});wrap.appendChild(cond);

wrap.appendChild(sl('Data'));
const dataCard=div({});dataCard.className='card card-p';
dataCard.appendChild(btn({width:'100%',padding:'11px',background:'#FEF2F2',border:'0.5px solid #FECACA',borderRadius:'10px',color:'#DC2626',fontWeight:'500',fontSize:sz+'px',cursor:'pointer'},'Clear all today\'s data',()=>{
  if(confirm('This will clear all of today\'s logged meals, symptoms, stool, water, activities, and notes. Are you sure?')){
    S.todayMeals=[];S.symptomLogs=[];S.stoolLogs=[];S.noteLogs=[];S.waterLogs=[];S.water=0;S.activityLogs=[];S.morningDoneAt=null;saveState();render();showToast('All data cleared',null);
  }
}));
wrap.appendChild(dataCard);

return wrap;}

// ===== MODALS =====
function renderModal(){
const mc=document.getElementById('modal-container');mc.innerHTML='';
if(S.morningOpen){mc.appendChild(buildMorningModal());return;}
if(S.docOpen){mc.appendChild(buildDocModal());return;}}

// [11] Morning check-in with skip button on every step
function buildMorningModal(){
const t=T(),a=A(),sz=z();
const bg=div({position:'fixed',inset:'0',background:'rgba(0,0,0,0.35)',zIndex:'150',display:'flex',alignItems:'flex-end',maxWidth:'430px',margin:'0 auto'});
const sheet=div({background:t.surf,borderRadius:'20px 20px 0 0',padding:'24px 20px 40px',width:'100%',boxSizing:'border-box'});
const hdr=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'});
hdr.appendChild(div({fontSize:(sz+4)+'px',fontWeight:'600',color:t.text},[txt('Morning check-in')]));
hdr.appendChild(btn({background:'none',border:'none',fontSize:'20px',color:t.muted,cursor:'pointer'},'×',()=>{S.morningOpen=false;renderModal();}));
sheet.appendChild(hdr);
const prog=div({height:'3px',background:t.surf2,borderRadius:'999px',marginBottom:'20px'});
prog.appendChild(div({height:'100%',width:((S.morningStep+1)/6*100)+'%',background:a.m,borderRadius:'999px',transition:'width .3s'}));
sheet.appendChild(prog);
const steps=['Tongue coating?','Reflux overnight?','Indigestion?','Nasal congestion?','Weight this morning?','Sleep quality?'];
sheet.appendChild(div({fontSize:sz+'px',fontWeight:'500',color:t.text,marginBottom:'14px'},[txt(steps[S.morningStep])]));
const content=div({});const d=S.morningData;
if(S.morningStep===0){
  const row=div({display:'flex',gap:'8px',marginBottom:'12px'});
  ['No','Yes'].forEach((l,i)=>{row.appendChild(btn({flex:'1',padding:'14px',borderRadius:'12px',border:'0.5px solid '+(d.tongue===(i===1)?a.m:t.bdr),background:d.tongue===(i===1)?a.bg:t.surf,color:d.tongue===(i===1)?a.t:t.muted,fontSize:sz+'px',fontWeight:'500',cursor:'pointer'},l,()=>{S.morningData.tongue=(i===1);renderModal();}));});
  content.appendChild(row);
  if(d.tongue){content.appendChild(div({fontSize:(sz-2)+'px',color:t.muted,marginBottom:'6px'},[txt('Severity')]));const r=document.createElement('input');r.type='range';r.min=1;r.max=10;r.value=d.tsev;r.style.accentColor=a.m;r.oninput=e=>{S.morningData.tsev=+e.target.value;renderModal();};content.appendChild(r);content.appendChild(div({fontSize:(sz-1)+'px',color:t.text,textAlign:'center',marginTop:'4px'},[txt(d.tsev+'/10')]));}
}else if(S.morningStep>=1&&S.morningStep<=3){
  const key2=['reflux','indigestion','nasal'][S.morningStep-1];
  ['No','Yes'].forEach((l,i)=>{content.appendChild(btn({width:'100%',padding:'13px',borderRadius:'12px',border:'0.5px solid '+(d[key2]===(i===1)?a.m:t.bdr),background:d[key2]===(i===1)?a.bg:t.surf,color:d[key2]===(i===1)?a.t:t.muted,fontSize:sz+'px',fontWeight:'500',cursor:'pointer',textAlign:'left',display:'block',marginBottom:'8px'},(d[key2]===(i===1)?'✓ ':'')+l,()=>{S.morningData[key2]=(i===1);renderModal();}));});
}else if(S.morningStep===4){
  const inp=document.createElement('input');inp.type='number';inp.step='0.1';inp.value=d.weight||'';inp.placeholder='65.1';
  Object.assign(inp.style,{width:'100%',fontSize:(sz+6)+'px',fontWeight:'600',textAlign:'center',border:'0.5px solid '+t.bdr,borderRadius:'12px',padding:'16px',boxSizing:'border-box',background:t.surf2,color:t.text});
  inp.oninput=e=>{S.morningData.weight=e.target.value;};content.appendChild(inp);
  content.appendChild(div({fontSize:(sz-2)+'px',color:t.muted,textAlign:'center',marginTop:'6px'},[txt('kg')]));
  setTimeout(()=>inp.focus(),50);
}else{
  const row=div({display:'flex',gap:'6px'});
  SLEEP_LABELS.forEach(label=>{row.appendChild(btn({flex:'1',padding:'12px 4px',borderRadius:'12px',border:'0.5px solid '+(d.sleepQ===label?a.m:t.bdr),background:d.sleepQ===label?a.bg:t.surf,color:d.sleepQ===label?a.t:t.muted,fontSize:(sz-2)+'px',fontWeight:'500',cursor:'pointer'},label,()=>{S.morningData.sleepQ=label;renderModal();}));});
  content.appendChild(row);
}
sheet.appendChild(content);

// [11] Button row with Skip
const btns=div({display:'flex',gap:'8px',marginTop:'20px',alignItems:'center'});
// Skip button (prominent on weight step)
const skipStyle=S.morningStep===4?{padding:'12px 16px',borderRadius:'12px',border:'0.5px solid '+t.bdr,background:t.surf2,color:t.muted,fontSize:sz+'px',cursor:'pointer',fontWeight:'500'}:{padding:'8px 12px',background:'none',border:'none',color:t.muted,fontSize:(sz-2)+'px',cursor:'pointer'};
btns.appendChild(btn(skipStyle,'Skip',()=>{
  if(S.morningStep<5){S.morningStep++;renderModal();}else{
    S.morningOpen=false;S.morningDoneAt=Date.now();saveState();renderModal();render();showToast('Morning check-in saved ✓',null);
  }
}));
if(S.morningStep>0)btns.appendChild(btn({flex:'1',padding:'12px',borderRadius:'12px',border:'0.5px solid '+t.bdr,background:t.surf,color:t.muted,fontSize:sz+'px',cursor:'pointer'},'Back',()=>{S.morningStep--;renderModal();}));
btns.appendChild(btn({flex:'2',padding:'12px',borderRadius:'12px',border:'none',background:a.m,color:'#fff',fontSize:sz+'px',fontWeight:'600',cursor:'pointer'},S.morningStep<5?'Continue':'Done',()=>{
  if(S.morningStep<5){S.morningStep++;renderModal();}else{
    S.morningOpen=false;S.morningDoneAt=Date.now();
    saveState();renderModal();render();showToast('Morning check-in saved ✓',null);
  }
}));sheet.appendChild(btns);bg.appendChild(sheet);return bg;}

// [15] Doctor report includes activities
function buildDocModal(){
const t=T(),a=A(),sz=z();
const totalW=S.waterLogs.reduce((s2,w)=>s2+w.ml,0);
const tCals=S.todayMeals.reduce((s2,m)=>s2+(m.cals||0),0);
const tP=S.todayMeals.reduce((s2,m)=>s2+(m.protein||0),0);
const tF=S.todayMeals.reduce((s2,m)=>s2+(m.fat||0),0);
const tC=S.todayMeals.reduce((s2,m)=>s2+(m.carbs||0),0);
const todayDate=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

const report=[
'SOMA HEALTH EXPORT — Sean, 24yo, Male, 5\'11"',
'Date: '+todayDate,
'',
'BLOOD MARKERS (most recent):',
'  ALT: 71 (07 Feb) → 206 (15 Mar)',
'  Neutrophils: 0.9 → 0.7',
'  WBC: 2.7 → 3.0 | Platelets: 99 → 105',
'  Iron, B12, Ferritin, Folate: All normal',
'',
'MORNING CHECK-IN:',
S.morningDoneAt?[
'  Tongue coating: '+(S.morningData.tongue?'Yes ('+S.morningData.tsev+'/10)':'No'),
'  Overnight reflux: '+(S.morningData.reflux?'Yes':'No'),
'  Indigestion: '+(S.morningData.indigestion?'Yes':'No'),
'  Nasal congestion: '+(S.morningData.nasal?'Yes':'No'),
'  Weight: '+(S.morningData.weight?S.morningData.weight+'kg':'Not recorded'),
'  Sleep quality: '+S.morningData.sleepQ
].join('\n'):'  Not completed today',
'',
'TODAY\'S MACROS:',
'  Calories: '+tCals+' kcal (target: '+S.targets.calories+')',
'  Protein: '+tP+'g | Fat: '+tF+'g | Carbs: '+tC+'g',
'',
'MEALS LOGGED ('+S.todayMeals.length+'):',
...(S.todayMeals.length>0?S.todayMeals.map(m=>'  '+m.time+': '+m.name+' ('+m.cals+' kcal, P:'+m.protein+'g F:'+m.fat+'g C:'+m.carbs+'g)'+'\n    Ingredients: '+(m.ingredients||[]).join(', ')):['  None logged']),
'',
'SYMPTOMS LOGGED ('+S.symptomLogs.length+'):',
...(S.symptomLogs.length>0?S.symptomLogs.map(s2=>'  '+(s2.symptom?tc(s2.symptom):'Unknown')+' at '+s2.time+(s2.level?' — '+s2.level+'/10':'')+(s2.duration?' for '+s2.duration:'')):['  None logged']),
'',
'ACTIVITIES LOGGED ('+S.activityLogs.length+'):',
...(S.activityLogs.length>0?S.activityLogs.map(ac=>'  '+(ac.time||'')+' · '+(ac.activity||'Activity')+(ac.duration?' · '+ac.duration:'')+(ac.note?' · '+ac.note:'')):['  None logged']),
'',
'WATER INTAKE: '+totalW+'ml (target: '+S.targets.water+'ml)',
...(S.waterLogs.length>0?S.waterLogs.map(w=>'  '+w.ml+'ml at '+w.time):[]),
'',
'STOOL LOG ('+S.stoolLogs.length+'):',
...(S.stoolLogs.length>0?S.stoolLogs.map(s2=>'  Type '+s2.type+' · '+s2.color+(s2.assisted?' · Assisted':'')+' — '+BRISTOL[s2.type-1]):['  None logged']),
'',
'NOTES:',
...(S.noteLogs.length>0?S.noteLogs.map(n=>'  '+n):['  None']),
'',
'CONDITIONS: Suspected SIBO (H2/CH4), SIFO, Biliary/Gallbladder dysfunction',
'DIET: GF, dairy-free (except ghee), soy-free, low-FODMAP, low-fat',
'SUPPLEMENTS: All paused (ALT 206) except Buscopan 10mg PRN, Famotidine 20mg',
'POSTURE: Anterior pelvic tilt, rounded shoulders, forward head posture, tight pelvic floor'
].join('\n');

const bg=div({position:'fixed',inset:'0',background:'rgba(0,0,0,0.35)',zIndex:'150',display:'flex',alignItems:'flex-end',maxWidth:'430px',margin:'0 auto'});
const sheet=div({background:t.surf,borderRadius:'20px 20px 0 0',padding:'20px 18px 40px',width:'100%',boxSizing:'border-box',maxHeight:'80vh',display:'flex',flexDirection:'column'});
const hdr2=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'});
hdr2.appendChild(div({fontSize:(sz+4)+'px',fontWeight:'600',color:t.text},[txt('Doctor Report')]));
hdr2.appendChild(btn({background:'none',border:'none',fontSize:'20px',color:t.muted,cursor:'pointer'},'×',()=>{S.docOpen=false;renderModal();}));
sheet.appendChild(hdr2);
const pre=document.createElement('pre');
Object.assign(pre.style,{flex:'1',overflowY:'auto',background:t.surf2,borderRadius:'12px',padding:'12px',fontSize:'9px',color:t.sub,lineHeight:'1.6',whiteSpace:'pre-wrap',marginBottom:'12px',fontFamily:'monospace'});
pre.textContent=report;sheet.appendChild(pre);
const cb=btn({width:'100%',padding:'13px',background:a.m,border:'none',borderRadius:'12px',color:'#fff',fontWeight:'600',fontSize:sz+'px',cursor:'pointer'},'Copy for doctor / Claude',()=>{
  try{navigator.clipboard.writeText(report);cb.textContent='✓ Copied!';cb.style.background='#22C55E';setTimeout(()=>{cb.textContent='Copy for doctor / Claude';cb.style.background=a.m;},2500);}catch(e){}
});sheet.appendChild(cb);bg.appendChild(sheet);return bg;}

// ===== RENDER =====
function renderContent(){
const con=document.getElementById('content');con.innerHTML='';
const views={home:viewHome,analysis:viewAnalysis,charts:viewCharts,history:viewHistory,library:viewLibrary,progress:viewProgress,settings:viewSettings,tasks:viewTasks};
const vfn=views[S.view];if(vfn)con.appendChild(vfn());}

function renderBottomNav(){
const nav=document.getElementById('bottomnav');nav.innerHTML='';
BOTTOM_NAV.forEach(n=>{
  const b=document.createElement('button');
  b.className=S.view===n.id||(n.id==='more'&&['analysis','history','library','settings','charts'].includes(S.view))?'active':'';
  b.innerHTML='<svg viewBox="0 0 24 24">'+n.svg+'</svg><span>'+n.label+'</span>';
  b.onclick=()=>navTo(n.id);nav.appendChild(b);
});}

function renderMorePanel(){
const nav=document.getElementById('mp-nav');nav.innerHTML='';
MORE_NAV.forEach(n=>{
  const b=document.createElement('button');
  Object.assign(b.style,{display:'flex',alignItems:'center',gap:'10px',width:'100%',padding:'10px 12px',background:S.view===n.id?'var(--ac-bg)':'transparent',border:'none',borderRadius:'10px',cursor:'pointer',textAlign:'left',color:S.view===n.id?'var(--ac-t)':'var(--muted)',marginBottom:'2px'});
  const icon=document.createElement('span');icon.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+n.svg+'</svg>';
  icon.style.display='flex';icon.style.alignItems='center';b.appendChild(icon);
  const lbl=document.createElement('span');lbl.style.cssText='font-size:'+z()+'px;font-weight:'+(S.view===n.id?'500':'400');lbl.textContent=n.label;b.appendChild(lbl);
  b.onclick=()=>navTo(n.id);nav.appendChild(b);
});
const wt=S.morningData.weight?S.morningData.weight+' kg':'—';
document.getElementById('mp-sub').textContent='Sean · '+wt;}

function render(){
applyTheme();renderContent();renderBottomNav();renderMorePanel();
}

// Init
loadState();render();scheduleAllNotifications();
</script>
