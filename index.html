  <script type="module">
import { createHotContext } from "/@vite/client";
const hot = createHotContext("/__dummy__runtime-error-plugin");

function sendError(error) {
  if (!(error instanceof Error)) {
    error = new Error("(unknown runtime error)");
  }
  const serialized = {
    message: error.message,
    stack: error.stack,
  };
  hot.send("runtime-error-plugin:error", serialized);
}

// Only notify the parent frame after the server confirms the error passed
// the filter and the overlay will be shown.
hot.on("runtime-error-plugin:notify-parent", () => {
  try {
    window.parent.postMessage({ type: "runtime-error", id: null }, "*");
  } catch (_) {}
});

window.addEventListener("error", (evt) => {
  sendError(evt.error);
});

window.addEventListener("unhandledrejection", (evt) => {
  sendError(evt.reason);
});
</script>

function findFood(w){
  const raw=w.toLowerCase().trim();
  let s=raw;
  if(s.endsWith('oes')&&!s.endsWith('toes')){s=s.slice(0,-2);}
  else if(s.endsWith('toes')){s=s.slice(0,-2);}
  else if(s.endsWith('ies')){s=s.slice(0,-3)+'y';}
  else if(s.endsWith('s')&&!s.endsWith('ss')&&!s.endsWith('us')){s=s.slice(0,-1);}
  let cl=s;
  COOK_WORDS.forEach(cw=>{cl=cl.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});
  cl=cl.replace(/\s+/g,' ').trim();
  if(!cl)return null;
  return FDB.find(f=>f.n===cl||f.n===s||f.n===raw||cl.includes(f.n)||f.n.includes(cl)||(f.a&&f.a.some(a=>a===cl||a===s||a===raw||cl.includes(a)||a.includes(cl))));
}
function extractCook(text){const l=text.toLowerCase();for(const cw of COOK_WORDS){if(l.includes(cw))return cw.charAt(0).toUpperCase()+cw.slice(1);}return null;}
function tc(s){return s.replace(/\b\w/g,c=>c.toUpperCase());}

function cleanName(n){
  let c=n.toLowerCase();
  const protectedNames=['sweet potato','white rice','brown rice','sea bass','bone broth','egg white','white fish','coconut oil','olive oil','ginger tea','maris piper','coconut water'];
  const placeholders={};
  protectedNames.forEach((pn,i)=>{const ph='__PROT'+i+'__';if(c.includes(pn)){placeholders[ph]=pn;c=c.replace(new RegExp(pn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),ph);}});
  COOK_WORDS.forEach(cw=>{c=c.replace(new RegExp('\\b'+cw+'\\b','gi'),'').trim();});
  c=c.replace(/\bat\b/gi,'').trim();
  c=c.replace(/\b(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\b/gi,'').trim();
  c=c.replace(/\bon\b/gi,'').trim();
  c=c.replace(/^\d+\s+/,'').replace(/\s+\d+$/,'').trim();
  Object.entries(placeholders).forEach(([ph,orig])=>{c=c.replace(new RegExp(ph,'g'),orig);});
  let result=tc(c.replace(/\s+/g,' ').trim());
  if(result.length<=3){const fd=findFood(result);if(fd)result=tc(fd.n);}

}

function parseMeal(text){

function isSupplementEntry(text){const l=text.toLowerCase();if(findSupplementByPrefix(l))return true;if(/\b\d+\s*(?:mg|mcg|iu)\b/i.test(l))return true;return false;}

function detectType(text){
  const l=text.toLowerCase();
  const isLiquidTerm=/\b(?:water|coconut water|tea|broth|juice|squash|peppermint|chamomile|fennel|ginger tea|herbal|liquorice)\b/i.test(l);
  const hasLiquidQty=/\b\d+\s*(?:ml|litre|liter|l\b|glass)/i.test(l);
  const hasMealQty=/\b\d+\s*g\b/i.test(l);
  if((isLiquidTerm||hasLiquidQty)&&!hasMealQty){const mealWords=MKW.filter(x=>x!=='coconut'&&l.includes(x)).length;if(mealWords===0)return'liquid';}

function parseStool(text){const l=text.toLowerCase();const tm=l.match(/type\s*(\d)/);const type=tm?+tm[1]:4;let color='Brown';['dark brown','green','yellow-brown','yellow','light brown'].forEach(c=>{if(l.includes(c))color=tc(c);});return{type,color,assisted:l.includes('assist')||l.includes('suppository'),note:null,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})};}

function parseSymptom(text){const l=text.toLowerCase();let sym=null,level=null,duration=null,time=null,timeStart=null,timeEnd=null;
const symMap={cramping:/cramp/,burn:/burn/,reflux:/reflux|heartburn/,bloating:/bloat/,fatigue:/fatigue|tired/,brainfog:/brain\s*fog|fog/,dryskin:/dry\s*skin|skin/,tongue:/tongue|coating/,indigestion:/indigestion/,nasal:/nasal|congestion/,redskin:/red\s*skin|redness/};

function parseActivity(text){

function parseLiquid(text){

// ===== LIBRARY DATE FORMAT (v5.5 #14) =====
function formatLibDate(dateStr){
  const today=new Date();today.setHours(0,0,0,0);
  const date=new Date(dateStr+'T00:00:00');
  const diffMs=today.getTime()-date.getTime();
  const diffDays=Math.round(diffMs/86400000);
  const [y,m,d]=dateStr.split('-');
  const formatted=d+'-'+m+'-'+y;
  if(diffDays<=7){
    const dayName=date.toLocaleDateString('en-GB',{weekday:'long'});
    return dayName+' / '+formatted;
  }
  return formatted;
}

}

// ===== PROPAGATE EDITS (v5.5 #6) =====
function propagateFoodEdit(oldName,newName,newMacros){
  // Update all historical days
  const updateMeal=(m)=>{
    if(!m.ingredients)return;
    m.ingredients=m.ingredients.map(ing=>{
      const ingLC=ing.toLowerCase();
      if(ingLC.includes(oldName.toLowerCase())){return ing.replace(new RegExp(oldName,'gi'),newName);}
      return ing;
    });
    // Recalc macros if macros changed
    if(newMacros){
      let k=0,p=0,c=0,f=0,su=0,fi=0;
      (m.ingredients||[]).forEach(ing=>{
        const gMatch=ing.match(/:\s*(\d+(?:\.\d+)?)\s*g/);
        const g=gMatch?parseFloat(gMatch[1]):100;
        const ingNameRaw=ing.split(':')[0].trim().toLowerCase();
        const fd=FDB.find(f2=>tc(f2.n)===ingNameRaw||f2.n===ingNameRaw);
        if(fd){k+=fd.v[0]*g/100;p+=fd.v[1]*g/100;c+=fd.v[2]*g/100;f+=fd.v[3]*g/100;su+=fd.v[4]*g/100;fi+=fd.v[5]*g/100;}
      });
      if(k>0)m.cals=Math.round(k);if(p>0)m.protein=Math.round(p);if(c>0)m.carbs=Math.round(c);if(f>0)m.fat=Math.round(f);
    }
  };
  S.todayMeals.forEach(updateMeal);
  (S.days||[]).forEach(day=>{(day.meals||[]).forEach(updateMeal);});
}

function propagateSuppEdit(oldName,newName){
  const update=(sup)=>{if(sup.name===oldName)sup.name=newName;};
  S.supplementLogs.forEach(update);
  (S.days||[]).forEach(day=>{(day.supplements||[]).forEach(update);});
}

function doManualLog(){
  const time=S.manualTime||getNow();const dateStr=S.manualDate||new Date().toISOString().split('T')[0];const todayStr=new Date().toISOString().split('T')[0];const isPast=dateStr!==todayStr;
  if(S.manualType==='ingredients'&&S.manualIngredients.length>0){
    let k=0,p=0,c=0,f=0,su=0,fi=0;const ings=[];const ingMethods=[];
    S.manualIngredients.forEach(ing=>{const fd=ing.fd||findFood(ing.name);if(fd){const g=ing.grams;const[fk,fp,fc,ff2,fs,ffi]=fd.v;k+=fk*g/100;p+=fp*g/100;c+=fc*g/100;f+=ff2*g/100;su+=fs*g/100;fi+=ffi*g/100;}ings.push(cleanName(ing.name)+': '+ing.grams+'g');ingMethods.push(ing.method||null);});
    const names=S.manualIngredients.map(i=>cleanName(i.name)).filter(n=>n.length>1);const mealName=names.length<=2?names.join(' & '):(names.slice(0,-1).join(', ')+' & '+names[names.length-1])||'Logged Meal';
    const meal={name:mealName,ingredients:ings,ingredientMethods:ingMethods,cals:Math.round(k)||null,protein:Math.round(p)||null,carbs:Math.round(c)||null,fat:Math.round(f)||null,sugar:Math.round(su)||null,fibre:+(fi.toFixed(1))||null,time,texture:'Soft',fatLevel:Math.round(f)>12?'High':Math.round(f)>5?'Medium':'Low',cookingMethod:'Not specified'};
    if(isPast)logToPastDate(dateStr,'meal',meal);else S.todayMeals.unshift(meal);
    S.logResult={type:'meal',meal};if(!isPast)showToast(mealName+' logged',null);
  }else if(S.manualType==='liquids'&&S.manualLiquids.length>0){
    S.manualLiquids.forEach(lq=>{const fd=findFood(lq.name.toLowerCase());const isCalLiq=fd&&fd.isCalorieLogging;const entry={ml:lq.ml,name:lq.name,time,type:lq.name==='Water'?'water':'other',isCalorieLogging:isCalLiq||false,foodRef:isCalLiq?fd:null};if(isPast)logToPastDate(dateStr,'liquid',entry);else S.liquidLogs.push(entry);});
    S.logResult={type:'liquid',ml:S.manualLiquids[0].ml,name:S.manualLiquids[0].name};if(!isPast)showToast('Liquids logged',null);
  }else if(S.manualType==='supplements'&&S.manualSupplements.length>0){
    S.manualSupplements.forEach(sup=>{const entry={name:sup.name,quantity:sup.quantity,totalDose:sup.dose+sup.unit,time,note:null};if(isPast)logToPastDate(dateStr,'supplement',entry);else S.supplementLogs.push(entry);});
    S.logResult={type:'supplement',name:S.manualSupplements[0].name,totalDose:S.manualSupplements[0].dose+S.manualSupplements[0].unit};if(!isPast)showToast('Supplements logged',null);
  }else if(S.manualType==='activities'&&S.manualActivities.length>0){
    S.manualActivities.forEach(ac=>{const entry={activity:ac.activity,duration:ac.duration,time,note:null};if(isPast)logToPastDate(dateStr,'activity',entry);else S.activityLogs.push(entry);});
    S.logResult={type:'activity',activity:S.manualActivities[0].activity};if(!isPast)showToast('Activity logged',null);
  }else if(S.manualType==='symptoms'&&S.manualSymptoms.length>0){
    S.manualSymptoms.forEach(sym=>{const entry={symptom:sym.symptom,level:sym.level,duration:sym.duration,time,raw:sym.symptom};if(isPast)logToPastDate(dateStr,'symptom',entry);else S.symptomLogs.push(entry);});
    S.logResult={type:'symptom',text:S.manualSymptoms[0].symptom,time};if(!isPast)showToast('Symptom logged',null);
  }else if(S.manualType==='notes'){
    const noteEl=document.getElementById('manual-note-text');const noteText=noteEl?noteEl.value.trim():'';
    if(!noteText){showToast('Nothing to log',null);return;}
    if(isPast)logToPastDate(dateStr,'note',noteText);else S.noteLogs.push(noteText);
    S.logResult={type:'note',text:noteText};if(!isPast)showToast('Note saved',null);
  }else{showToast('Nothing to log',null);return;}
  S.logActive=false;S.manualIngredients=[];S.manualSupplements=[];S.manualLiquids=[];S.manualActivities=[];S.manualSymptoms=[];S.manualTime=null;S.manualDate=null;S.selectedIngredient=null;
  saveState();render();

const AI_SYSTEM_PROMPT=`You are a nutrition parser for a health tracking app. Parse the user's log entry and return ONLY valid JSON.
Detect type: meal, liquid, supplement, water, symptom, stool, activity, or note.
IMPORTANT PARSING RULES:
- Do NOT assume a cooking method unless the user explicitly states one.
- Parse ALL ingredients mentioned. "chicken breast, potatoes and carrots" = 3 separate ingredients.
- Handle compound quantities: "2 cups rice and 3 fried eggs" = both items.
- For eggs: 1 egg without shell = 50g. Small ~42g, Medium ~48g, Large ~50g, XL ~56g.
- Coconut water is a LIQUID, not a meal. Log as type "liquid" with liquidType "other".
- Water is a LIQUID with 0 calories, not a meal.
- Fat per-meal limit is 12g. Flag meals above this.
- When no cooking method is stated, use "Not specified".
- Bare times like "11:55" or "13:00" without am/pm are 24-hour format.
For meals, calculate accurate macros. Never include ghee, olive oil, coconut oil, or butter in the meal name.
Extract cooking method per ingredient. Extract time if mentioned (format HH:MM 24hr).
If the entry mentions a past date (e.g. "yesterday", "on 25 march", "march 30"), include "targetDate" field. Today is ${new Date().toISOString().split('T')[0]}.
Return this exact JSON structure:
{"type":"meal","targetDate":"2026-03-25","meal":{"name":"Chicken Breast & Rice","time":"11:00","cookingMethod":"Not specified","texture":"Soft","fatLevel":"Low","cals":450,"protein":42,"carbs":55,"fat":4,"sugar":0,"fibre":0.5,"ingredients":["Chicken Breast: 150g","White Rice: 200g"],"ingredientMethods":["Not specified","Not specified"]}}
For liquids: {"type":"liquid","name":"Coconut Water","ml":300,"time":"14:00","liquidType":"other"}
For water: {"type":"liquid","name":"Water","ml":500,"time":"09:00","liquidType":"water"}
For supplements: {"type":"supplement","name":"Buscopan","quantity":1,"time":"14:00"}
For symptom: {"type":"symptom","symptom":"cramping","level":4,"duration":"2 hrs","time":"14:00","timeStart":"14:00","timeEnd":"16:00","raw":"..."}
For stool: {"type":"stool","stoolType":4,"color":"Brown","assisted":false}
For activity: {"type":"activity","activity":"Walk","duration":"30 mins","intensity":"moderate","note":null,"time":"13:00"}
For note: {"type":"note","text":"..."}
Return ONLY JSON. No markdown. No explanation.`;

async function aiParse(text){
  try{const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:AI_SYSTEM_PROMPT,messages:[{role:"user",content:text}]})});
  if(!response.ok)throw new Error('API '+response.status);
  const data=await response.json();const raw=data.content.map(i=>i.text||'').join('').trim();return JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){console.error('AI parse failed:',e);return null;}}

function logToPastDate(targetDate,type,entry){
  let day=S.days.find(d=>d.date===targetDate);
  if(!day){day={date:targetDate,meals:[],symptoms:[],stool:[],notes:[],liquids:[],liquidTotal:0,activities:[],supplements:[]};S.days.push(day);S.days.sort((a,b)=>a.date.localeCompare(b.date));}
  if(!day.activities)day.activities=[];if(!day.liquids)day.liquids=[];if(!day.supplements)day.supplements=[];
  if(type==='meal')(day.meals=day.meals||[]).unshift(entry);
  else if(type==='symptom')(day.symptoms=day.symptoms||[]).push(entry);
  else if(type==='stool')(day.stool=day.stool||[]).push(entry);
  else if(type==='liquid'){(day.liquids=day.liquids||[]).push(entry);day.liquidTotal=(day.liquidTotal||0)+entry.ml;}
  else if(type==='activity')(day.activities).push(entry);
  else if(type==='supplement')(day.supplements).push(entry);
  else if(type==='note')(day.notes=day.notes||[]).push(entry);
  showToast('Logged to '+targetDate,null);
}

async function doLog(){
const text=(S.logText||'').trim();if(!text)return;
S.logLoading=true;S.logActive=false;S.logText='';render();
const localTargetDate=parseTargetDate(text);const pickerTime=S.manualTime||null;const pickerDate=S.manualDate||null;const todayStr=new Date().toISOString().split('T')[0];const effectiveDate=pickerDate&&pickerDate!==todayStr?pickerDate:(localTargetDate||null);
const aiResult=await aiParse(text);
if(aiResult&&aiResult.type){const td=aiResult.targetDate||effectiveDate||null;if(pickerTime){if(aiResult.meal)aiResult.meal.time=pickerTime;if(aiResult.time)aiResult.time=pickerTime;}processAIResult(aiResult,text,td);}
else{const parts=splitLogEntry(text);parts.forEach(part=>{processLocalPart(part.text,effectiveDate,pickerTime);});}

function processAIResult(res,rawText,targetDate){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];
  if(res.type==='meal'&&res.meal){const m=res.meal;if(!m.time)m.time=getNow();if(!m.texture)m.texture='Soft';if(!m.fatLevel)m.fatLevel=(m.fat||0)>10?'High':(m.fat||0)>5?'Medium':'Low';if(!m.cookingMethod)m.cookingMethod='Not specified';if(!m.ingredientMethods)m.ingredientMethods=(m.ingredients||[]).map(()=>m.cookingMethod);if(isPast){logToPastDate(targetDate,'meal',m);}else{S.todayMeals=[m,...S.todayMeals];}S.logResult={type:'meal',meal:m};if(!isPast)showToast(m.name+' logged',null);
  }else if(res.type==='liquid'){const ml=res.ml||250;const name=res.name||'Water';const ltype=res.liquidType||'water';const fd=findFood(name.toLowerCase());const isCalLiq=fd&&fd.isCalorieLogging;const entry={ml,name,time:res.time||getNow(),type:ltype,isCalorieLogging:isCalLiq||false,foodRef:isCalLiq?fd:null};if(isPast){logToPastDate(targetDate,'liquid',entry);}else{S.liquidLogs.push(entry);}S.logResult={type:'liquid',ml,name};if(!isPast)showToast(name+' — '+ml+'ml logged',null);
  }else if(res.type==='water'){const ml=res.ml||250;const entry={ml,name:'Water',time:res.time||getNow(),type:'water',isCalorieLogging:false};if(isPast){logToPastDate(targetDate,'liquid',entry);}else{S.liquidLogs.push(entry);}S.logResult={type:'liquid',ml,name:'Water'};if(!isPast)showToast(ml+'ml water logged',null);
  }else if(res.type==='supplement'){const sup=findSuppFromAI(res);if(isPast){logToPastDate(targetDate,'supplement',sup);}else{S.supplementLogs.push(sup);}S.logResult={type:'supplement',name:sup.name,totalDose:sup.totalDose};if(!isPast)showToast(sup.name+' logged',null);
  }else if(res.type==='symptom'){const parsed={symptom:res.symptom||null,level:res.level||null,duration:res.duration||null,time:res.timeStart&&res.timeEnd?(res.timeStart+'–'+res.timeEnd):(res.time||getNow()),timeStart:res.timeStart||null,timeEnd:res.timeEnd||null,raw:rawText};if(parsed.timeStart&&parsed.timeEnd&&!parsed.duration){const[sh,sm]=parsed.timeStart.split(':').map(Number);const[eh,em]=parsed.timeEnd.split(':').map(Number);const dm=(eh*60+em)-(sh*60+sm);if(dm>0){parsed.duration=dm>=60?Math.floor(dm/60)+' hr'+(Math.floor(dm/60)>1?'s':''):dm+' mins';}}if(isPast){logToPastDate(targetDate,'symptom',parsed);}else{S.symptomLogs.push(parsed);}S.logResult={type:'symptom',text:rawText,time:parsed.time};if(!isPast)showToast('Symptom logged',null);
  }else if(res.type==='stool'){const stool={type:res.stoolType||4,color:res.color||'Brown',assisted:res.assisted||false,note:null,time:getNow()};if(isPast){logToPastDate(targetDate,'stool',stool);}else{S.stoolLogs.push(stool);}S.logResult={type:'stool',stool};if(!isPast)showToast('Stool logged — Type '+stool.type,null);
  }else if(res.type==='activity'){const act={activity:res.activity||'Activity',duration:res.duration||null,intensity:res.intensity||null,note:res.note||null,time:res.time||getNow()};if(isPast){logToPastDate(targetDate,'activity',act);}else{S.activityLogs.push(act);}S.logResult={type:'activity',activity:act.activity};if(!isPast)showToast(act.activity+' logged',null);
  }else if(res.type==='note'){const noteText=res.text||rawText;if(isPast){logToPastDate(targetDate,'note',noteText);}else{S.noteLogs.push(noteText);}S.logResult={type:'note',text:noteText};if(!isPast)showToast('Note saved',null);}
}

function findSuppFromAI(res){const name=res.name||'Unknown';const quantity=res.quantity||1;const dbMatch=SUPPLEMENT_DB.find(s=>s.name.toLowerCase()===name.toLowerCase()||s.kw.some(kw=>name.toLowerCase().includes(kw)));if(dbMatch){const customDose=S.supplementDoses[dbMatch.name];const dosePerUnit=customDose||dbMatch.dosePerUnit;return{name:dbMatch.name,quantity,totalDose:(quantity*dosePerUnit)+dbMatch.unit,time:res.time||getNow(),note:null};}return{name,quantity,totalDose:quantity+' unit'+(quantity>1?'s':''),time:res.time||getNow(),note:null};}

function processLocalPart(text,targetDate,pickerTime){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];const type=detectType(text);
  if(type==='meal'){const meal=parseMeal(text);if(pickerTime)meal.time=pickerTime;if(isPast){logToPastDate(targetDate,'meal',meal);}else{S.todayMeals=[meal,...S.todayMeals];}S.logResult={type:'meal',meal};if(!isPast)showToast(meal.name+' logged',null);
  }else if(type==='liquid'){const liq=parseLiquid(text);if(pickerTime)liq.time=pickerTime;if(isPast){logToPastDate(targetDate,'liquid',liq);}else{S.liquidLogs.push(liq);}S.logResult={type:'liquid',ml:liq.ml,name:liq.name};if(!isPast)showToast(liq.name+' — '+liq.ml+'ml logged',null);
  }else if(type==='supplement'){const sup=parseSupplementLog(text);if(pickerTime)sup.time=pickerTime;if(isPast){logToPastDate(targetDate,'supplement',sup);}else{S.supplementLogs.push(sup);}S.logResult={type:'supplement',name:sup.name,totalDose:sup.totalDose};if(!isPast)showToast(sup.name+' logged',null);
  }else if(type==='stool'){const stool=parseStool(text);if(isPast){logToPastDate(targetDate,'stool',stool);}else{S.stoolLogs.push(stool);}S.logResult={type:'stool',stool};if(!isPast)showToast('Stool logged — Type '+stool.type,null);
  }else if(type==='symptom'){const parsed=parseSymptom(text);if(pickerTime)parsed.time=pickerTime;if(isPast){logToPastDate(targetDate,'symptom',parsed);}else{S.symptomLogs.push(parsed);}S.logResult={type:'symptom',text,time:parsed.time};if(!isPast)showToast('Symptom logged',null);
  }else if(type==='activity'){const act=parseActivity(text);if(pickerTime)act.time=pickerTime;if(isPast){logToPastDate(targetDate,'activity',act);}else{S.activityLogs.push(act);}S.logResult={type:'activity',activity:act.activity};if(!isPast)showToast(act.activity+' logged',null);
  }else{if(isPast){logToPastDate(targetDate,'note',text);}else{S.noteLogs.push(text);}S.logResult={type:'note',text};if(!isPast)showToast('Note saved',null);}
}

function splitLogEntry(text){const sentences=text.split(/(?<=[.!])\s+/).filter(s2=>s2.trim().length>0);if(sentences.length>1)return sentences.map(s2=>({text:s2.trim()}));const parts=text.split(/\.\s+/).filter(s2=>s2.trim().length>0);if(parts.length>1)return parts.map(s2=>({text:s2.trim()}));return[{text}];}

function toggleTask(id){const tk=S.tasks.find(t=>t.id===id);if(!tk)return;tk.completed=!tk.completed;if(tk.completed){const l=tk.title.toLowerCase();const isActivity=AKW.some(kw=>l.includes(kw));if(isActivity){S.activityLogs.push({activity:tk.title,duration:null,intensity:null,note:'Auto-logged from Tasks',time:getNow()});showToast(tk.title+' logged to Activities ✓',null);}}saveState();render();}
const notifTimeouts=new Map();
