<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Sora',system-ui,sans-serif}
body{background:#F0EFEC;color:#1C1917;font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit;outline:none}
textarea{resize:none}
select{-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2378716C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;width:100%;background:var(--surf2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac,#F59E0B);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}

#bottomnav button span{font-size:10px;font-weight:500;letter-spacing:-.01em}
#morepanel{position:absolute;top:0;right:-260px;width:244px;height:100%;background:var(--surf);z-index:50;transition:right .26s cubic-bezier(.4,0,.2,1);border-left:0.5px solid var(--bdr);display:flex;flex-direction:column}

.sl{font-size:11px;font-weight:600;color:var(--ac);letter-spacing:.04em;text-transform:uppercase;margin:22px 0 10px}
.chip{display:inline-block;font-size:9px;font-weight:500;padding:2px 7px;border-radius:999px;white-space:nowrap;letter-spacing:.01em}
.mbar{margin-bottom:8px}.mbar-row{display:flex;justify-content:space-between;margin-bottom:3px}.mbar-row span:first-child{font-size:11px;color:var(--muted)}.mbar-row span:last-child{font-size:11px;font-weight:500}.mbar-track{height:4px;background:var(--surf2);border-radius:999px}.mbar-fill{height:100%;border-radius:999px;transition:width .3s ease}

.dropdown-compact{border:0.5px solid var(--bdr);border-radius:10px;padding:7px 10px;background:var(--surf);color:var(--text);font-size:11px;cursor:pointer;width:auto;max-width:160px;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2378716C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:24px}
.empty-state{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}

@keyframes spin{to{transform:rotate(360deg)}}

.ml-search-inp{width:100%;border:0.5px solid var(--bdr);border-radius:8px;padding:6px 8px;font-size:11px;color:var(--text);background:var(--surf2);box-sizing:border-box;margin-bottom:4px}

.log-section{background:var(--surf);border:0.5px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px}
.log-type-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}

.log-type-tab.active{background:var(--ac-bg);border-color:var(--ac-bdr);color:var(--ac-t);font-weight:600}
.section-divider{height:1px;background:var(--bdr);margin:12px 0;opacity:0.6}
/* Edit modal */
.edit-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;max-width:430px;margin:0 auto}
.edit-modal-sheet{background:var(--surf);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;box-sizing:border-box;max-height:85vh;overflow-y:auto}

/* Firebase sync indicator */
#sync-dot{position:fixed;top:16px;right:16px;width:7px;height:7px;border-radius:50%;z-index:100;opacity:0;transition:opacity .5s}
#sync-dot.syncing{opacity:1;background:#F59E0B;animation:pulse .8s ease-in-out infinite}
#sync-dot.synced{opacity:1;background:#22C55E}
#sync-dot.error{opacity:1;background:#EF4444}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}

<script>
(function() {
  'use strict';
  var firebaseConfig = {
    apiKey: "AIzaSyBP2VXKW3ivaJS4mkgCnHiTfO7FbzTrDng",
    authDomain: "soma-a556e.firebaseapp.com",
    databaseURL: "https://soma-a556e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "soma-a556e",
    storageBucket: "soma-a556e.firebasestorage.app",
    messagingSenderId: "974911303273",
    appId: "1:974911303273:web:72b3ee7a25d7efda6dfcf8"
  };

  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    var db = firebase.database();
    var uid = null;
    var syncTimer = null;
    var dot = null;
    var pendingSync = null;

    function getDot() {
      if (!dot) dot = document.getElementById('sync-dot');
      return dot;
    }

    function showDot(state) {
      var d = getDot();
      if (!d) return;
      d.className = state;
      if (state === 'synced') {
        setTimeout(function() { d.className = ''; }, 2500);
      }
    }

    function sync(data) {
      if (!uid) { pendingSync = data; return; }
      clearTimeout(syncTimer);
      showDot('syncing');
      syncTimer = setTimeout(function() {
        db.ref('users/' + uid + '/data').set(data)
          .then(function() { showDot('synced'); })
          .catch(function(err) {
            console.warn('Firebase sync failed:', err);
            showDot('error');
          });
      }, 1200);
    }

    function loadLatest() {
      if (!uid) return Promise.resolve(null);
      return db.ref('users/' + uid + '/data').once('value')
        .then(function(snap) { return snap.val(); })
        .catch(function(err) {
          console.warn('Firebase load failed:', err);
          return null;
        });
    }

    window._somaFB = { sync: sync, loadLatest: loadLatest };

    firebase.auth().signInAnonymously()
      .then(function(cred) {
        uid = cred.user.uid;
        console.log('Firebase auth OK, uid:', uid);
        if (pendingSync) { sync(pendingSync); pendingSync = null; }
        if (window._somaFB.onAuth) window._somaFB.onAuth();
      })
      .catch(function(err) {
        console.warn('Firebase anonymous auth failed:', err);
        showDot('error');
      });
  } catch(e) {
    console.warn('Firebase init failed:', e);
    window._somaFB = null;
  }
})();
</script>

<body>
<div id="app">
  <div id="overlay" onclick="closeMore()"></div>
  <div id="morepanel">
    <div style="padding:50px 18px 16px;border-bottom:0.5px solid var(--bdr)">
      <div style="font-size:22px;font-weight:700;color:var(--ac);letter-spacing:-.8px">soma</div>

    </div>
    <div id="mp-nav" style="flex:1;padding:10px;overflow-y:auto"></div>

  </div>
  <div id="hdr">
    <span style="font-size:20px;font-weight:700;color:var(--ac);letter-spacing:-.8px">soma</span>
  </div>

  <button class="fab" onclick="goLog()">+</button>

  <div id="toast"><div style="background:#1C1917;border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.25)"><span id="toast-msg" style="color:#fff;font-size:12px;font-weight:400"></span><div style="display:flex;gap:10px;align-items:center"><button id="toast-undo" style="color:#F59E0B;font-size:12px;font-weight:600;display:none" onclick="doUndo()">Undo</button><button onclick="hideToast()" style="color:#6B7280;font-size:16px;line-height:1">&times;</button></div></div><div style="height:2px;background:#374151;border-radius:999px;margin-top:3px"><div id="toast-bar" style="height:100%;width:100%;background:#F59E0B;border-radius:999px;transition:width .08s linear"></div></div></div>

<script>
// ===== THEMES & ACCENTS =====
const FONTS={'sora':['Sora','sans-serif'],'dm-sans':['DM Sans','sans-serif'],'jakarta':['Plus Jakarta Sans','sans-serif'],'outfit':['Outfit','sans-serif'],'nunito':['Nunito Sans','sans-serif'],'inter':['Inter','sans-serif']};
const THEMES={light:{bg:'#F0EFEC',surf:'#FFFFFF',surf2:'#F7F7F6',text:'#1C1917',sub:'#44403C',muted:'#9CA3AF',bdr:'#E5E5E4'},dark:{bg:'#161615',surf:'#1E1D1C',surf2:'#272625',text:'#F5F5F4',sub:'#D6D3D1',muted:'#78716C',bdr:'#333230'},warm:{bg:'#FDF8F0',surf:'#FFFBF5',surf2:'#F5ECD9',text:'#2C1810',sub:'#5C3D2E',muted:'#9C7060',bdr:'#E8D5C0'},cool:{bg:'#F0F4F8',surf:'#FFFFFF',surf2:'#E8EFF6',text:'#1E2A3A',sub:'#354A60',muted:'#6B82A0',bdr:'#CDD8E5'}};
const ACCENTS={amber:{m:'#F59E0B',bg:'#FFFBEB',bdr:'#FDE68A',t:'#92400E'},teal:{m:'#14B8A6',bg:'#F0FDFA',bdr:'#99F6E4',t:'#0F766E'},blue:{m:'#3B82F6',bg:'#EFF6FF',bdr:'#BFDBFE',t:'#1D4ED8'},coral:{m:'#F97316',bg:'#FFF7ED',bdr:'#FED7AA',t:'#C2410C'},purple:{m:'#8B5CF6',bg:'#F5F3FF',bdr:'#DDD6FE',t:'#5B21B6'},green:{m:'#22C55E',bg:'#F0FDF4',bdr:'#BBF7D0',t:'#15803D'},rose:{m:'#F43F5E',bg:'#FFF1F2',bdr:'#FECDD3',t:'#BE123C'},slate:{m:'#64748B',bg:'#F8FAFC',bdr:'#CBD5E1',t:'#334155'},gold:{m:'#CA8A04',bg:'#FEFCE8',bdr:'#FEF08A',t:'#713F12'},mint:{m:'#34D399',bg:'#ECFDF5',bdr:'#A7F3D0',t:'#065F46'},crimson:{m:'#DC2626',bg:'#FEF2F2',bdr:'#FECACA',t:'#991B1B'},indigo:{m:'#6366F1',bg:'#EEF2FF',bdr:'#C7D2FE',t:'#3730A3'},ocean:{m:'#0EA5E9',bg:'#F0F9FF',bdr:'#BAE6FD',t:'#0369A1'},peach:{m:'#FB923C',bg:'#FFF7ED',bdr:'#FED7AA',t:'#9A3412'},olive:{m:'#84CC16',bg:'#F7FEE7',bdr:'#D9F99D',t:'#3F6212'},magenta:{m:'#D946EF',bg:'#FDF4FF',bdr:'#F5D0FE',t:'#86198F'},sky:{m:'#38BDF8',bg:'#F0F9FF',bdr:'#BAE6FD',t:'#0C4A6E'},copper:{m:'#C2724E',bg:'#FDF5F0',bdr:'#E8C4AD',t:'#7C3A1D'}};

// ===== SUPPLEMENT DATABASE =====
const SUPPLEMENT_DB=[
  {name:'Buscopan',dosePerUnit:10,unit:'mg',form:'tablet',kw:['buscopan','busc']},
  {name:'Famotidine',dosePerUnit:20,unit:'mg',form:'tablet',kw:['famotidine','famo']},
  {name:'Milk Thistle',dosePerUnit:1,unit:'cap',form:'capsule',kw:['milk thistle','milkthistle']},
  {name:'L-Taurine',dosePerUnit:500,unit:'mg',form:'capsule',kw:['taurine','l-taurine']},
  {name:'Slippery Elm',dosePerUnit:1,unit:'cap',form:'capsule',kw:['slippery elm','slippery']},
  {name:'Zinc Carnosine',dosePerUnit:1,unit:'cap',form:'capsule',kw:['zinc carnosine','zinc']},
  {name:'Magnesium Glycinate',dosePerUnit:400,unit:'mg',form:'capsule',kw:['magnesium glycinate','glycinate','mag glycinate']},
  {name:'Magnesium Citrate',dosePerUnit:3,unit:'g',form:'powder',kw:['magnesium citrate','citrate','mag citrate']},
  {name:'Vitamin B Complex',dosePerUnit:1,unit:'cap',form:'capsule',kw:['vitamin b','vit b','b complex','b-complex']}
];
let SUPP_KW=SUPPLEMENT_DB.flatMap(s=>s.kw);

function findSupplementByPrefix(text){
  const l=text.toLowerCase().trim();
  for(const sup of SUPPLEMENT_DB){if(sup.kw.some(kw=>l.includes(kw)))return sup;}
  const words=l.split(/\s+/);
  for(const w of words){if(w.length<3)continue;for(const sup of SUPPLEMENT_DB){if(sup.kw.some(kw=>kw.startsWith(w)||sup.name.toLowerCase().startsWith(w)))return sup;}}
  return null;
}

// ===== DEFAULT DB ARRAYS (must be before saveState/loadState) =====
const DEFAULT_LIQUID_DB=[{name:'Water',defaultMl:250},{name:'Coconut Water',defaultMl:330},{name:'Ginger Tea',defaultMl:240},{name:'Peppermint Tea',defaultMl:240},{name:'Chamomile Tea',defaultMl:240},{name:'Fennel Tea',defaultMl:240},{name:'Liquorice Tea',defaultMl:240},{name:'Bone Broth',defaultMl:240},{name:'Herbal Tea',defaultMl:240},{name:'Tea',defaultMl:240},{name:'Coffee',defaultMl:240},{name:'Juice',defaultMl:250},{name:'Squash',defaultMl:250},{name:'Oat Milk',defaultMl:250},{name:'Almond Milk',defaultMl:250}];
const DEFAULT_ACTIVITY_DB=[{name:'Walk'},{name:'Hike'},{name:'Run'},{name:'Swim'},{name:'Sauna'},{name:'Steam Room'},{name:'Exercise'},{name:'Gym Session'},{name:'Meditation'},{name:'Breathwork'},{name:'Yoga'},{name:'Stretching'},{name:'Lymph Workout'},{name:'Cold Water Therapy'},{name:'Stressful Event'},{name:'Weed'}];

const DEFAULT_STOOL_DB=[{type:1,label:'Type 1',desc:'Separate hard lumps',colors:['Brown','Dark Brown']},{type:2,label:'Type 2',desc:'Lumpy sausage shape',colors:['Brown','Dark Brown']},{type:3,label:'Type 3',desc:'Sausage with cracks',colors:['Brown','Light Brown']},{type:4,label:'Type 4',desc:'Smooth soft sausage',colors:['Brown','Light Brown','Yellow']},{type:5,label:'Type 5',desc:'Soft blobs with edges',colors:['Brown','Light Brown','Yellow']},{type:6,label:'Type 6',desc:'Fluffy mushy pieces',colors:['Brown','Yellow','Green']},{type:7,label:'Type 7',desc:'Entirely liquid',colors:['Brown','Yellow','Green','Red']}];

// ===== PERSISTENCE =====

function exportReadable(){
  try{
    const todayStr=new Date().toISOString().split('T')[0];
    const formatDay=(dayData,label)=>{
      const obj={date:label||dayData.date};
      if(dayData.meals&&dayData.meals.length>0){obj.meals=dayData.meals.map(m=>({name:m.name,time:m.time||null,calories:m.cals||null,protein:m.protein||null,carbs:m.carbs||null,fat:m.fat||null,sugar:m.sugar||null,fibre:m.fibre||null,ingredients:m.ingredients||[]}));}
      if(dayData.liquids&&dayData.liquids.length>0){obj.liquids=dayData.liquids.map(l=>({name:l.name||'Water',ml:l.ml,time:l.time||null}));}
      if(dayData.supplements&&dayData.supplements.length>0){obj.supplements=dayData.supplements.map(s=>({name:s.name,dose:s.totalDose||null,time:s.time||null}));}
      if(dayData.symptoms&&dayData.symptoms.length>0){obj.symptoms=dayData.symptoms.map(s=>({name:s.symptom?tc(s.symptom):s.raw||'Unknown',level:s.level||null,duration:s.duration||null,time:s.time||null}));}
      if(dayData.activities&&dayData.activities.length>0){obj.activities=dayData.activities.map(ac=>({name:ac.activity||'Activity',duration:ac.duration||null,time:ac.time||null}));}
      if(dayData.stool&&dayData.stool.length>0){obj.stool=dayData.stool.map(st=>({type:st.type,color:st.color,time:st.time||null}));}
      if(dayData.notes&&dayData.notes.length>0){obj.notes=dayData.notes;}
      if(dayData.morningData){const md=dayData.morningData;obj.morning_checkin={weight:md.weight||null,tongue_coating:md.tongue?'Yes ('+md.tsev+'/10)':'No',nasal_congestion:md.nasal?'Yes':'No',brain_fog:md.brainfog?'Yes':'No',sleep_time:md.sleepTime||null,wake_time:md.wokeTime||null,sleep_quality:md.sleepQ||null};}
      return obj;
    };
    const days=[];
    // Archived days
    (S.days||[]).forEach(d=>{days.push(formatDay(d,d.date));});
    // Today's data
    const todayHasData=S.todayMeals.length||S.liquidLogs.length||S.supplementLogs.length||S.symptomLogs.length||S.activityLogs.length||S.stoolLogs.length||S.noteLogs.length;
    if(todayHasData){
      days.push(formatDay({date:'Today (not yet archived)',meals:S.todayMeals,liquids:S.liquidLogs,supplements:S.supplementLogs,symptoms:S.symptomLogs,activities:S.activityLogs,stool:S.stoolLogs,notes:S.noteLogs,morningData:S.morningDoneAt?S.morningData:null},'Today (not yet archived) — '+todayStr));
    }
    const json=JSON.stringify({generated:new Date().toISOString(),person:'Sean, 24yo Male, 5\'11"',days},null,2);
    const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);const a2=document.createElement('a');a2.href=url;a2.download='soma-readable-'+todayStr+'.json';document.body.appendChild(a2);a2.click();document.body.removeChild(a2);URL.revokeObjectURL(url);showToast('Readable export downloaded',null);
  }catch(e){showToast('Export failed: '+e.message,null);}
}

function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.savedDate){showToast('Invalid backup file',null);return;}
        try{
          const today=new Date().toISOString().split('T')[0];
          // Merge historical days: imported wins on same date
          const existingDays=S.days||[];const importedDays=d.days||[];
          const merged={};existingDays.forEach(day=>{merged[day.date]=day;});importedDays.forEach(day=>{merged[day.date]=day;});
          S.days=Object.values(merged).sort((a,b)=>a.date.localeCompare(b.date));
          // Merge today's logs if imported savedDate === today
          if(d.savedDate===today){
            const dedup=(existing,incoming,keyFn)=>{const keys=new Set(existing.map(keyFn));return [...existing,...(incoming||[]).filter(x=>!keys.has(keyFn(x)))];};
            const timeNameKey=x=>(x.name||'')+'|'+(x.time||'');
            S.todayMeals=dedup(S.todayMeals,d.meals||[],x=>(x.name||'')+'|'+(x.time||''));
            S.liquidLogs=dedup(S.liquidLogs,d.liquids||[],timeNameKey);
            S.symptomLogs=dedup(S.symptomLogs,d.symptoms||[],x=>(x.symptom||'')+'|'+(x.time||''));
            S.activityLogs=dedup(S.activityLogs,d.activities||[],x=>(x.activity||'')+'|'+(x.time||''));
            S.supplementLogs=dedup(S.supplementLogs,d.supplements||[],timeNameKey);
            S.stoolLogs=dedup(S.stoolLogs,d.stool||[],x=>(x.type||'')+'|'+(x.time||''));
            S.noteLogs=dedup(S.noteLogs,d.notes||[],x=>x);
          }
          // Merge tasks by ID
          const existingTaskIds=new Set((S.tasks||[]).map(t=>t.id));
          (d.tasks||[]).forEach(t=>{if(!existingTaskIds.has(t.id))S.tasks.push(t);});
          const existingOOIds=new Set((S.oneOffTasks||[]).map(t=>t.id));
          (d.oneOffTasks||[]).forEach(t=>{if(!existingOOIds.has(t.id))S.oneOffTasks.push(t);});
          // Merge foodDB by name
          const existingFoodNames=new Set(FDB.map(f=>f.n.toLowerCase()));
          (d.foodDB||[]).forEach(f=>{if(!existingFoodNames.has(f.n.toLowerCase()))FDB.push(f);});
          // Merge suppDB by name
          const existingSuppNames=new Set(SUPPLEMENT_DB.map(s=>s.name.toLowerCase()));
          (d.suppDB||[]).forEach(s=>{if(!existingSuppNames.has(s.name.toLowerCase()))SUPPLEMENT_DB.push(s);});
          SUPP_KW=SUPPLEMENT_DB.flatMap(s=>s.kw);
          if(d.bloodMarkers)S.bloodMarkers=d.bloodMarkers.filter(bm=>!(bm.name==='New Marker'&&bm.vals.length<=1&&bm.vals[0]&&bm.vals[0].v===0&&!bm.vals[0].date));
          if(d.docSections)S.docSections={...S.docSections,...d.docSections};
          if(d.docRange)S.docRange=d.docRange;
          // Settings NOT imported — keep device settings
          saveState();render();showToast('Import merged successfully',null);
        }catch(writeErr){showToast('Import failed: '+writeErr.message,null);}
      }catch(er){showToast('Import failed: invalid JSON',null);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function formatLibDate(dateStr){
  const today=new Date();today.setHours(0,0,0,0);
  const date=new Date(dateStr+'T00:00:00');
  const diffMs=today.getTime()-date.getTime();
  const diffDays=Math.round(diffMs/86400000);
  const [y,m,d]=dateStr.split('-');
  const formatted=d+'/'+m+'/'+y;
  if(diffDays<=7){
    const dayName=date.toLocaleDateString('en-GB',{weekday:'long'});
    return formatted+' - '+dayName;
  }
  return formatted;
}

// ===== PROPAGATE EDITS (v5.5 #6, v5.7 full macro recalc) =====
function propagateFoodEdit(oldName,newName,doMacroRecalc){
  const updateMeal=(m)=>{
    if(!m.ingredients)return;
    m.ingredients=m.ingredients.map(ing=>{
      const ingLC=ing.toLowerCase();
      if(ingLC.includes(oldName.toLowerCase())){return ing.replace(new RegExp(oldName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),newName);}
      return ing;
    });
    if(doMacroRecalc){
      let k=0,p=0,c=0,f=0,su=0,fi=0;let hasAny=false;
      (m.ingredients||[]).forEach(ing=>{
        const gMatch=ing.match(/:\s*(\d+(?:\.\d+)?)\s*g/);
        const g=gMatch?parseFloat(gMatch[1]):100;
        const ingNameRaw=ing.split(':')[0].trim().toLowerCase();
        const fd=FDB.find(f2=>tc(f2.n).toLowerCase()===ingNameRaw||f2.n===ingNameRaw||ingNameRaw.includes(f2.n)||f2.n.includes(ingNameRaw));
        if(fd){k+=fd.v[0]*g/100;p+=fd.v[1]*g/100;c+=fd.v[2]*g/100;f+=fd.v[3]*g/100;su+=fd.v[4]*g/100;fi+=fd.v[5]*g/100;hasAny=true;}
      });
      if(hasAny){m.cals=Math.round(k);m.protein=Math.round(p);m.carbs=Math.round(c);m.fat=Math.round(f);m.sugar=Math.round(su);m.fibre=parseFloat(fi.toFixed(1));}
    }
  };
  S.todayMeals.forEach(updateMeal);
  (S.days||[]).forEach(day=>{(day.meals||[]).forEach(updateMeal);});
  if(doMacroRecalc)showToast('Macros updated across all meals',null);
}

function doManualLog(){
  const time=S.manualTime||getNow();const dateStr=S.manualDate||new Date().toISOString().split('T')[0];const todayStr=new Date().toISOString().split('T')[0];const isPast=dateStr!==todayStr;
  if(S.manualType==='ingredients'&&S.manualIngredients.length>0){
    let k=0,p=0,c=0,f=0,su=0,fi=0;const ings=[];const ingMethods=[];
    S.manualIngredients.forEach(ing=>{const fd=ing.fd||findFood(ing.name);if(fd){const g=ing.grams;const[fk,fp,fc,ff2,fs,ffi]=fd.v;k+=fk*g/100;p+=fp*g/100;c+=fc*g/100;f+=ff2*g/100;su+=fs*g/100;fi+=ffi*g/100;}ings.push(cleanName(ing.name)+': '+ing.grams+'g');ingMethods.push(ing.method||null);});
    const names=S.manualIngredients.map(i=>cleanName(i.name)).filter(n=>n.length>1);const mealName=names.length<=2?names.join(' & '):(names.slice(0,-1).join(', ')+' & '+names[names.length-1])||'Logged Meal';
    const meal={name:mealName,ingredients:ings,ingredientMethods:ingMethods,cals:Math.round(k)||null,protein:Math.round(p)||null,carbs:Math.round(c)||null,fat:Math.round(f)||null,sugar:Math.round(su)||null,fibre:+(fi.toFixed(1))||null,time,texture:'Soft',fatLevel:Math.round(f)>12?'High':Math.round(f)>5?'Medium':'Low',cookingMethod:'Not specified'};
    if(isPast)logToPastDate(dateStr,'meal',meal);else S.todayMeals.unshift(meal);
    S.logResult={type:'meal',meal};if(!isPast)showToast(mealName+' logged',null);
  }else if(S.manualType==='liquids'&&S.manualLiquids.length>0){
    S.manualLiquids.forEach(lq=>{const fd=findFood(lq.name.toLowerCase());const isCalLiq=fd&&fd.isCalorieLogging;const entry={ml:lq.ml,name:lq.name,time,type:lq.name==='Water'?'water':'other',isCalorieLogging:isCalLiq||false,foodRef:isCalLiq?fd:null};if(isPast)logToPastDate(dateStr,'liquid',entry);else S.liquidLogs.push(entry);});
    S.logResult={type:'liquid',ml:S.manualLiquids[0].ml,name:S.manualLiquids[0].name};if(!isPast)showToast('Liquids logged',null);
  }else if(S.manualType==='supplements'&&S.manualSupplements.length>0){
    S.manualSupplements.forEach(sup=>{const entry={name:sup.name,quantity:sup.quantity,totalDose:sup.dose+sup.unit,time,note:null};if(isPast)logToPastDate(dateStr,'supplement',entry);else S.supplementLogs.push(entry);});
    S.logResult={type:'supplement',name:S.manualSupplements[0].name,totalDose:S.manualSupplements[0].dose+S.manualSupplements[0].unit};if(!isPast)showToast('Supplements logged',null);
  }else if(S.manualType==='activities'&&S.manualActivities.length>0){
    S.manualActivities.forEach(ac=>{const entry={activity:ac.activity,duration:ac.duration,time,note:null};if(isPast)logToPastDate(dateStr,'activity',entry);else S.activityLogs.push(entry);});
    S.logResult={type:'activity',activity:S.manualActivities[0].activity};if(!isPast)showToast('Activity logged',null);
  }else if(S.manualType==='symptoms'&&S.manualSymptoms.length>0){
    S.manualSymptoms.forEach(sym=>{const entry={symptom:sym.symptom,level:sym.level,duration:sym.duration,time,raw:sym.symptom};if(isPast)logToPastDate(dateStr,'symptom',entry);else S.symptomLogs.push(entry);});
    S.logResult={type:'symptom',text:S.manualSymptoms[0].symptom,time};if(!isPast)showToast('Symptom logged',null);
  }else if(S.manualType==='stool'){
    const ms=S._manualStool||{type:4,color:'Brown',assisted:false};
    const entry={type:ms.type,color:ms.color,assisted:ms.assisted,time,note:null};
    if(isPast)logToPastDate(dateStr,'stool',entry);else S.stoolLogs.push(entry);
    S.logResult={type:'stool',stool:entry};if(!isPast)showToast('Stool logged — Type '+ms.type,null);
    S._manualStool=null;
  }else if(S.manualType==='notes'){
    const noteEl=document.getElementById('manual-note-text');const noteText=noteEl?noteEl.value.trim():'';
    if(!noteText){showToast('Nothing to log',null);return;}
    if(isPast)logToPastDate(dateStr,'note',noteText);else S.noteLogs.push(noteText);
    S.logResult={type:'note',text:noteText};if(!isPast)showToast('Note saved',null);
  }else{showToast('Nothing to log',null);return;}
  S.logActive=false;S.manualIngredients=[];S.manualSupplements=[];S.manualLiquids=[];S.manualActivities=[];S.manualSymptoms=[];S.manualTime=null;S.manualDate=null;S.selectedIngredient=null;S._manualStool=null;
  saveState();render();
}

const AI_SYSTEM_PROMPT=`You are a nutrition parser for a health tracking app. Parse the user's log entry and return ONLY valid JSON.
Detect type: meal, liquid, supplement, water, symptom, stool, activity, or note.
IMPORTANT PARSING RULES:
- Do NOT assume a cooking method unless the user explicitly states one.
- Parse ALL ingredients mentioned. "chicken breast, potatoes and carrots" = 3 separate ingredients.
- Handle compound quantities: "2 cups rice and 3 fried eggs" = both items.
- For eggs: 1 egg without shell = 50g. Small ~42g, Medium ~48g, Large ~50g, XL ~56g.
- Coconut water is a LIQUID, not a meal. Log as type "liquid" with liquidType "other".
- Water is a LIQUID with 0 calories, not a meal.
- Fat per-meal limit is 12g. Flag meals above this.
- When no cooking method is stated, use "Not specified".
- Bare times like "11:55" or "13:00" without am/pm are 24-hour format.
For meals, calculate accurate macros. Never include ghee, olive oil, coconut oil, or butter in the meal name.
Extract cooking method per ingredient. Extract time if mentioned (format HH:MM 24hr).
If the entry mentions a past date (e.g. "yesterday", "on 25 march", "march 30"), include "targetDate" field. Today is ${new Date().toISOString().split('T')[0]}.
Return this exact JSON structure:
{"type":"meal","targetDate":"2026-03-25","meal":{"name":"Chicken Breast & Rice","time":"11:00","cookingMethod":"Not specified","texture":"Soft","fatLevel":"Low","cals":450,"protein":42,"carbs":55,"fat":4,"sugar":0,"fibre":0.5,"ingredients":["Chicken Breast: 150g","White Rice: 200g"],"ingredientMethods":["Not specified","Not specified"]}}
For liquids: {"type":"liquid","name":"Coconut Water","ml":300,"time":"14:00","liquidType":"other"}
For water: {"type":"liquid","name":"Water","ml":500,"time":"09:00","liquidType":"water"}
For supplements: {"type":"supplement","name":"Buscopan","quantity":1,"time":"14:00"}
For symptom: {"type":"symptom","symptom":"cramping","level":4,"duration":"2 hrs","time":"14:00","timeStart":"14:00","timeEnd":"16:00","raw":"..."}
For stool: {"type":"stool","stoolType":4,"color":"Brown","assisted":false}
For activity: {"type":"activity","activity":"Walk","duration":"30 mins","intensity":"moderate","note":null,"time":"13:00"}
For note: {"type":"note","text":"..."}
Return ONLY JSON. No markdown. No explanation.`;

async function aiParse(text){
  try{const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:AI_SYSTEM_PROMPT,messages:[{role:"user",content:text}]})});
  if(!response.ok)throw new Error('API '+response.status);
  const data=await response.json();const raw=data.content.map(i=>i.text||'').join('').trim();return JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){console.error('AI parse failed:',e);return null;}}

function logToPastDate(targetDate,type,entry){
  let day=S.days.find(d=>d.date===targetDate);
  if(!day){day={date:targetDate,meals:[],symptoms:[],stool:[],notes:[],liquids:[],liquidTotal:0,activities:[],supplements:[]};S.days.push(day);S.days.sort((a,b)=>a.date.localeCompare(b.date));}
  if(!day.activities)day.activities=[];if(!day.liquids)day.liquids=[];if(!day.supplements)day.supplements=[];
  if(type==='meal')(day.meals=day.meals||[]).unshift(entry);
  else if(type==='symptom')(day.symptoms=day.symptoms||[]).push(entry);
  else if(type==='stool')(day.stool=day.stool||[]).push(entry);
  else if(type==='liquid'){(day.liquids=day.liquids||[]).push(entry);day.liquidTotal=(day.liquidTotal||0)+entry.ml;}
  else if(type==='activity')(day.activities).push(entry);
  else if(type==='supplement')(day.supplements).push(entry);
  else if(type==='note')(day.notes=day.notes||[]).push(entry);
  showToast('Logged to '+targetDate,null);
}

const text=(S.logText||'').trim();if(!text)return;
S.logLoading=true;S.logActive=false;S.logText='';render();
const localTargetDate=parseTargetDate(text);const pickerTime=S.manualTime||null;const pickerDate=S.manualDate||null;const todayStr=new Date().toISOString().split('T')[0];const effectiveDate=pickerDate&&pickerDate!==todayStr?pickerDate:(localTargetDate||null);
const aiResult=await aiParse(text);

function processAIResult(res,rawText,targetDate){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];
  if(res.type==='meal'&&res.meal){const m=res.meal;if(!m.time)m.time=getNow();if(!m.texture)m.texture='Soft';if(!m.fatLevel)m.fatLevel=(m.fat||0)>10?'High':(m.fat||0)>5?'Medium':'Low';if(!m.cookingMethod)m.cookingMethod='Not specified';if(!m.ingredientMethods)m.ingredientMethods=(m.ingredients||[]).map(()=>m.cookingMethod);if(isPast){logToPastDate(targetDate,'meal',m);}else{S.todayMeals=[m,...S.todayMeals];}S.logResult={type:'meal',meal:m};if(!isPast)showToast(m.name+' logged',null);
  }else if(res.type==='liquid'){const ml=res.ml||250;const name=res.name||'Water';const ltype=res.liquidType||'water';const fd=findFood(name.toLowerCase());const isCalLiq=fd&&fd.isCalorieLogging;const entry={ml,name,time:res.time||getNow(),type:ltype,isCalorieLogging:isCalLiq||false,foodRef:isCalLiq?fd:null};if(isPast){logToPastDate(targetDate,'liquid',entry);}else{S.liquidLogs.push(entry);}S.logResult={type:'liquid',ml,name};if(!isPast)showToast(name+' — '+ml+'ml logged',null);
  }else if(res.type==='water'){const ml=res.ml||250;const entry={ml,name:'Water',time:res.time||getNow(),type:'water',isCalorieLogging:false};if(isPast){logToPastDate(targetDate,'liquid',entry);}else{S.liquidLogs.push(entry);}S.logResult={type:'liquid',ml,name:'Water'};if(!isPast)showToast(ml+'ml water logged',null);
  }else if(res.type==='supplement'){const sup=findSuppFromAI(res);if(isPast){logToPastDate(targetDate,'supplement',sup);}else{S.supplementLogs.push(sup);}S.logResult={type:'supplement',name:sup.name,totalDose:sup.totalDose};if(!isPast)showToast(sup.name+' logged',null);
  }else if(res.type==='symptom'){const parsed={symptom:res.symptom||null,level:res.level||null,duration:res.duration||null,time:res.timeStart&&res.timeEnd?(res.timeStart+'–'+res.timeEnd):(res.time||getNow()),timeStart:res.timeStart||null,timeEnd:res.timeEnd||null,raw:rawText};if(parsed.timeStart&&parsed.timeEnd&&!parsed.duration){const[sh,sm]=parsed.timeStart.split(':').map(Number);const[eh,em]=parsed.timeEnd.split(':').map(Number);const dm=(eh*60+em)-(sh*60+sm);if(dm>0){parsed.duration=dm>=60?Math.floor(dm/60)+' hr'+(Math.floor(dm/60)>1?'s':''):dm+' mins';}}if(isPast){logToPastDate(targetDate,'symptom',parsed);}else{S.symptomLogs.push(parsed);}S.logResult={type:'symptom',text:rawText,time:parsed.time};if(!isPast)showToast('Symptom logged',null);
  }else if(res.type==='stool'){const stool={type:res.stoolType||4,color:res.color||'Brown',assisted:res.assisted||false,note:null,time:getNow()};if(isPast){logToPastDate(targetDate,'stool',stool);}else{S.stoolLogs.push(stool);}S.logResult={type:'stool',stool};if(!isPast)showToast('Stool logged — Type '+stool.type,null);
  }else if(res.type==='activity'){const act={activity:res.activity||'Activity',duration:res.duration||null,intensity:res.intensity||null,note:res.note||null,time:res.time||getNow()};if(isPast){logToPastDate(targetDate,'activity',act);}else{S.activityLogs.push(act);}S.logResult={type:'activity',activity:act.activity};if(!isPast)showToast(act.activity+' logged',null);
  }else if(res.type==='note'){const noteText=res.text||rawText;if(isPast){logToPastDate(targetDate,'note',noteText);}else{S.noteLogs.push(noteText);}S.logResult={type:'note',text:noteText};if(!isPast)showToast('Note saved',null);}
}

function findSuppFromAI(res){const name=res.name||'Unknown';const quantity=res.quantity||1;const dbMatch=SUPPLEMENT_DB.find(s=>s.name.toLowerCase()===name.toLowerCase()||s.kw.some(kw=>name.toLowerCase().includes(kw)));if(dbMatch){const customDose=S.supplementDoses[dbMatch.name];const dosePerUnit=customDose||dbMatch.dosePerUnit;return{name:dbMatch.name,quantity,totalDose:(quantity*dosePerUnit)+dbMatch.unit,time:res.time||getNow(),note:null};}return{name,quantity,totalDose:quantity+' unit'+(quantity>1?'s':''),time:res.time||getNow(),note:null};}

function processLocalPart(text,targetDate,pickerTime){
  const isPast=targetDate&&targetDate!==new Date().toISOString().split('T')[0];const type=detectType(text);
  if(type==='meal'){const meal=parseMeal(text);if(pickerTime)meal.time=pickerTime;if(isPast){logToPastDate(targetDate,'meal',meal);}else{S.todayMeals=[meal,...S.todayMeals];}S.logResult={type:'meal',meal};if(!isPast)showToast(meal.name+' logged',null);
  }else if(type==='liquid'){const liq=parseLiquid(text);if(pickerTime)liq.time=pickerTime;if(isPast){logToPastDate(targetDate,'liquid',liq);}else{S.liquidLogs.push(liq);}S.logResult={type:'liquid',ml:liq.ml,name:liq.name};if(!isPast)showToast(liq.name+' — '+liq.ml+'ml logged',null);
  }else if(type==='supplement'){const sup=parseSupplementLog(text);if(pickerTime)sup.time=pickerTime;if(isPast){logToPastDate(targetDate,'supplement',sup);}else{S.supplementLogs.push(sup);}S.logResult={type:'supplement',name:sup.name,totalDose:sup.totalDose};if(!isPast)showToast(sup.name+' logged',null);
  }else if(type==='stool'){const stool=parseStool(text);if(isPast){logToPastDate(targetDate,'stool',stool);}else{S.stoolLogs.push(stool);}S.logResult={type:'stool',stool};if(!isPast)showToast('Stool logged — Type '+stool.type,null);
  }else if(type==='symptom'){const parsed=parseSymptom(text);if(pickerTime)parsed.time=pickerTime;if(isPast){logToPastDate(targetDate,'symptom',parsed);}else{S.symptomLogs.push(parsed);}S.logResult={type:'symptom',text,time:parsed.time};if(!isPast)showToast('Symptom logged',null);
  }else if(type==='activity'){const act=parseActivity(text);if(pickerTime)act.time=pickerTime;if(isPast){logToPastDate(targetDate,'activity',act);}else{S.activityLogs.push(act);}S.logResult={type:'activity',activity:act.activity};if(!isPast)showToast(act.activity+' logged',null);
  }else{if(isPast){logToPastDate(targetDate,'note',text);}else{S.noteLogs.push(text);}S.logResult={type:'note',text};if(!isPast)showToast('Note saved',null);}
}

function splitLogEntry(text){const sentences=text.split(/(?<=[.!])\s+/).filter(s2=>s2.trim().length>0);if(sentences.length>1)return sentences.map(s2=>({text:s2.trim()}));const parts=text.split(/\.\s+/).filter(s2=>s2.trim().length>0);if(parts.length>1)return parts.map(s2=>({text:s2.trim()}));return[{text}];}

function buildSVGChart(title,dataPoints,unit,color){
  const card=div({});card.className='card card-p';
  card.appendChild(div({fontSize:(sz-1)+'px',fontWeight:'600',color:t.text,marginBottom:'8px'},[txt(title)]));
  if(dataPoints.length<1){card.appendChild(div({fontSize:(sz-2)+'px',color:t.muted},[txt('No data yet.')]));return card;}
  const W=320,H=140,PL=35,PR=10,PT=10,PB=25;const cW=W-PL-PR,cH=H-PT-PB;
  const vals=dataPoints.map(d=>d.v);const maxV=Math.max(...vals,1);const minV=0;
  const barW=Math.max(4,Math.min(20,(cW/dataPoints.length)-2));
  let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">';
  // Grid lines
  for(let i=0;i<=4;i++){const y=PT+cH*(1-i/4);const val=Math.round(maxV*i/4);svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="'+(t.bdr)+'" stroke-width="0.5" stroke-dasharray="3,3"/>';svg+='<text x="'+(PL-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="8" fill="'+(t.muted)+'">'+val+'</text>';}
  // Bars
  dataPoints.forEach((d,i)=>{const x=PL+(i*(cW/dataPoints.length))+(cW/dataPoints.length-barW)/2;const h2=maxV>0?(d.v/maxV)*cH:0;const y=PT+cH-h2;svg+='<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+Math.max(1,h2)+'" rx="2" fill="'+color+'" opacity="0.85"/>';
    if(dataPoints.length<=14){const lbl=d.label.slice(5);svg+='<text x="'+(x+barW/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="7" fill="'+(t.muted)+'">'+lbl+'</text>';}
  });
  svg+='</svg>';
  const svgDiv=div({});svgDiv.innerHTML=svg;card.appendChild(svgDiv);
  // Summary
  const avg=Math.round(vals.reduce((s,v)=>s+v,0)/vals.length);
  card.appendChild(div({fontSize:(sz-2)+'px',color:t.muted,marginTop:'6px'},[txt('Avg: '+avg+unit+' · High: '+Math.max(...vals)+unit+' · Low: '+Math.min(...vals)+unit)]));
  return card;
}

  else if(e.cat==='liquid'){name=e.data.name||'Water';subtitle=e.time+' · '+e.data.ml+'ml';}

function buildDocModal(){
const t=T(),a=A(),sz=z();
const bg=div({position:'fixed',inset:'0',background:'rgba(0,0,0,0.35)',zIndex:'150',display:'flex',alignItems:'flex-end',maxWidth:'430px',margin:'0 auto'});
const sheet=div({background:t.surf,borderRadius:'20px 20px 0 0',padding:'20px 18px 40px',width:'100%',boxSizing:'border-box',maxHeight:'85vh',display:'flex',flexDirection:'column'});
const hdr2=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'});hdr2.appendChild(div({fontSize:(sz+4)+'px',fontWeight:'600',color:t.text},[txt('Doctor Report')]));hdr2.appendChild(btn({background:'none',border:'none',fontSize:'20px',color:t.muted,cursor:'pointer'},'×',()=>{S.docOpen=false;renderModal();}));sheet.appendChild(hdr2);

// Config controls

// Date range
cfgWrap.appendChild(div({fontSize:'10px',fontWeight:'600',color:t.muted,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'4px'},[txt('Date Range')]));
const rangeRow=div({display:'flex',gap:'6px',marginBottom:'10px',flexWrap:'wrap'});
['today','week','month'].forEach(r=>{rangeRow.appendChild(btn({padding:'6px 12px',borderRadius:'8px',border:'0.5px solid '+(S.docRange===r?a.m:t.bdr),background:S.docRange===r?a.bg:t.surf,color:S.docRange===r?a.t:t.muted,fontSize:(sz-2)+'px',fontWeight:'500',cursor:'pointer'},r==='today'?'Today':r==='week'?'Past 7 days':'Past 30 days',()=>{S.docRange=r;saveState();renderModal();}));});
cfgWrap.appendChild(rangeRow);
// Section toggles
cfgWrap.appendChild(div({fontSize:'10px',fontWeight:'600',color:t.muted,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'4px'},[txt('Include Sections')]));
const togGrid=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px',marginBottom:'8px'});
[['morningCheckin','Morning Check-in'],['meals','Meals'],['supplements','Supplements'],['symptoms','Symptoms'],['activities','Activities'],['liquids','Liquids'],['stool','Stool'],['notes','Notes']].forEach(([k,label])=>{
  const togRow=div({display:'flex',alignItems:'center',gap:'6px',padding:'4px 0'});
  const togBtn=document.createElement('button');togBtn.className='tog'+(S.docSections[k]?' on':'');togBtn.onclick=()=>{S.docSections[k]=!S.docSections[k];saveState();renderModal();};
  togRow.appendChild(togBtn);togRow.appendChild(div({fontSize:(sz-2)+'px',color:t.sub},[txt(label)]));togGrid.appendChild(togRow);
});

sheet.appendChild(cfgWrap);

// Gather data for range
const range=S.docRange||'today';const todayStr=new Date().toISOString().split('T')[0];
let rangeDays=[];
if(range==='today'){rangeDays=[{date:todayStr,meals:S.todayMeals,symptoms:S.symptomLogs,stool:S.stoolLogs,notes:S.noteLogs,liquids:S.liquidLogs,activities:S.activityLogs,supplements:S.supplementLogs,morningData:S.morningDoneAt?S.morningData:null}];}
else{const cutoffMs=range==='week'?7*86400000:30*86400000;const cutoff=new Date(Date.now()-cutoffMs).toISOString().split('T')[0];rangeDays=[{date:todayStr,meals:S.todayMeals,symptoms:S.symptomLogs,stool:S.stoolLogs,notes:S.noteLogs,liquids:S.liquidLogs,activities:S.activityLogs,supplements:S.supplementLogs,morningData:S.morningDoneAt?S.morningData:null},...(S.days||[]).filter(d=>d.date>=cutoff).reverse()];}

const rangeLabel=range==='today'?'Today':range==='week'?'Past 7 days':'Past 30 days';
const todayDate=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

// Build report
const lines=['SOMA HEALTH EXPORT — Sean, 24yo, Male, 5\'11"','Date: '+todayDate+' ('+rangeLabel+')',''];

// Blood markers
if(S.bloodMarkers.length>0){lines.push('BLOOD MARKERS:');S.bloodMarkers.forEach(bm=>{const valStr=bm.vals.map(v=>v.v+' ('+v.date+')').join(' → ');lines.push('  '+bm.name+': '+valStr+' [ref: '+bm.ref[0]+'–'+bm.ref[1]+' '+bm.unit+']');});lines.push('');}

rangeDays.forEach((day,di)=>{
  const dayLabel=day.date===todayStr?'TODAY ('+todayDate+')':formatLibDate(day.date);
  if(rangeDays.length>1)lines.push('--- '+dayLabel+' ---');

  // Morning check-in
  if(S.docSections.morningCheckin&&day.morningData){const md=day.morningData;lines.push('MORNING CHECK-IN:');lines.push('  Tongue coating: '+(md.tongue?'Yes ('+md.tsev+'/10)':'No'));lines.push('  Nasal: '+(md.nasal?'Yes':'No')+' | Brain fog: '+(md.brainfog?'Yes':'No'));if(md.sleepTime)lines.push('  Sleep: '+md.sleepTime+(md.wokeTime?' → '+md.wokeTime:'')+(md.sleepQ?' ('+md.sleepQ+')':''));if(md.weight)lines.push('  Weight: '+md.weight+'kg');if(md.nightWakes&&md.nightWakes.length>0)lines.push('  Night wakes: '+md.nightWakes.map(nw=>nw.time+' ('+nw.duration+'min)').join(', '));lines.push('');}

  // Meals
  const meals=[...(day.meals||[])].sort((a2,b2)=>(a2.time||'99:99').localeCompare(b2.time||'99:99'));
  if(S.docSections.meals&&meals.length>0){
    const tCals=meals.reduce((s,m)=>s+(m.cals||0),0);const tP=meals.reduce((s,m)=>s+(m.protein||0),0);const tF=meals.reduce((s,m)=>s+(m.fat||0),0);const tC=meals.reduce((s,m)=>s+(m.carbs||0),0);
    lines.push('MEALS ('+meals.length+') — Total: '+tCals+' kcal, P:'+tP+'g F:'+tF+'g C:'+tC+'g');
    meals.forEach((m,mi)=>{lines.push('  Meal '+(mi+1)+' ('+( m.time||'--')+') — '+(m.cals||0)+' kcal, P:'+(m.protein||0)+'g F:'+(m.fat||0)+'g C:'+(m.carbs||0)+'g');if(m.cookingMethod&&m.cookingMethod!=='Not specified')lines.push('    Method: '+m.cookingMethod);(m.ingredients||[]).forEach(ing=>{lines.push('    · '+ing);});});lines.push('');}

  // Supplements
  const supps=day.supplements||[];
  if(S.docSections.supplements&&supps.length>0){lines.push('SUPPLEMENTS ('+supps.length+'):');supps.forEach(sup=>{lines.push('  '+(sup.time||'')+': '+sup.name+(sup.quantity>1?' x'+sup.quantity:'')+' — '+sup.totalDose);});lines.push('');}

  // Symptoms
  const syms=day.symptoms||[];
  if(S.docSections.symptoms&&syms.length>0){lines.push('SYMPTOMS ('+syms.length+'):');syms.forEach(s2=>{lines.push('  '+(s2.symptom?tc(s2.symptom):'Unknown')+' at '+(s2.time||'')+(s2.level?' — '+s2.level+'/10':'')+(s2.duration?' for '+s2.duration:''));});lines.push('');}

  // Activities
  const acts=day.activities||[];
  if(S.docSections.activities&&acts.length>0){lines.push('ACTIVITIES ('+acts.length+'):');acts.forEach(ac=>{lines.push('  '+(ac.time||'')+' · '+(ac.activity||'Activity')+(ac.duration?' · '+ac.duration:''));});lines.push('');}

  // Liquids
  const liqs=day.liquids||[];
  if(S.docSections.liquids&&liqs.length>0){const liqTotal=liqs.reduce((s,l)=>s+(l.ml||0),0);lines.push('LIQUIDS: '+liqTotal+'ml');liqs.forEach(l=>{lines.push('  '+(l.name||'Water')+': '+l.ml+'ml at '+(l.time||''));});lines.push('');}

  // Stool
  const stools=day.stool||[];
  if(S.docSections.stool&&stools.length>0){lines.push('STOOL ('+stools.length+'):');stools.forEach(s2=>{lines.push('  Type '+s2.type+' · '+s2.color+(s2.assisted?' · Assisted':'')+' — '+BRISTOL[s2.type-1]);});lines.push('');}

  // Notes
  const notes=day.notes||[];
  if(S.docSections.notes&&notes.length>0){lines.push('NOTES:');notes.forEach(n=>{lines.push('  '+n);});lines.push('');}
});

const report=lines.join('\n');

const pre=document.createElement('pre');Object.assign(pre.style,{flex:'1',overflowY:'auto',background:t.surf2,borderRadius:'12px',padding:'12px',fontSize:'9px',color:t.sub,lineHeight:'1.6',whiteSpace:'pre-wrap',marginBottom:'12px',fontFamily:'monospace'});pre.textContent=report;sheet.appendChild(pre);
const cb=btn({width:'100%',padding:'13px',background:a.m,border:'none',borderRadius:'12px',color:'#fff',fontWeight:'600',fontSize:sz+'px',cursor:'pointer'},'Copy for doctor / Claude',()=>{try{navigator.clipboard.writeText(report);cb.textContent='✓ Copied!';cb.style.background='#22C55E';setTimeout(()=>{cb.textContent='Copy for doctor / Claude';cb.style.background=a.m;},2500);}catch(e){}});
sheet.appendChild(cb);bg.appendChild(sheet);return bg;}
